function row(q){return q.rowIndex||q.ligne||q.row||''}
function isPrivate(q){return norm(vis(q)).indexOf('prive')!==-1}
function isStar(q){return norm(vis(q)).indexOf('vedette')!==-1}

function isExplained(q){return norm(stat(q)).indexOf('expliquee')!==-1}

function isNew(q){return norm(stat(q)).indexOf('nouvelle')!==-1||!stat(q)}

function filteredQuestions(){var qs=state.questions.slice().sort(function(a,b){return Number(row(b)||0)-Number(row(a)||0)}); if(state.filter==='todo')qs=qs.filter(function(q){return !isExplained(q)}); if(state.filter==='classe')qs=qs.filter(isClass); if(state.filter==='private')qs=qs.filter(isPrivate); if(state.filter==='star')qs=qs.filter(isStar); if(state.filter==='done')qs=qs.filter(isExplained); if(state.visibility)qs=qs.filter(function(q){return norm(vis(q))===norm(state.visibility)}); if(state.status)qs=qs.filter(function(q){return norm(stat(q))===norm(state.status)}); if(state.matiere)qs=qs.filter(function(q){return norm(mat(q)).indexOf(norm(state.matiere))!==-1}); if(state.search){var s=norm(state.search); qs=qs.filter(function(q){return [prenom(q),mat(q),qorig(q),qcorr(q),ans(q),vis(q),stat(q)].join(' ').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').indexOf(s)!==-1})} return qs}

function exportStudents(){var rows=filteredStudentRows();var data=[['Prénom','Actif','Naissance','Sexe','Validations','Matières','Questions','Questions à traiter','Dernière compétence','Dernière matière','Dernière date']].concat(rows.map(function(r){return[r.name,r.active?'Oui':'Non',r.birth,r.sex,r.comps.length,r.subjectNames.join(', '),r.questions.length,r.pending,r.latest?compLabel(r.latest):'',r.latest?compSubject(r.latest):'',r.latest?compDate(r.latest):'']}));var csv=data.map(function(line){return line.map(function(c){return '"'+String(c==null?'':c).replace(/"/g,'""')+'"'}).join(';')}).join('\n');var blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='maitre_hibou_suivi_eleves.csv';a.click();setTimeout(function(){URL.revokeObjectURL(url)},0)}
function compResult(c){return clean(pick(c,['validations','Validations','score','Score','note','Note','resultat','Résultat','Resultat','pourcentage','Pourcentage'],'')).trim()}
function medalType(c){var raw=norm([compLevel(c),pick(c,['medaille','Médaille','Medaille','medal','Medal','rank','Rang'],'')].join(' '));if(raw.indexOf('🥇')!==-1||/(^|\s)or($|\s)/.test(raw)||raw.indexOf('gold')!==-1)return'gold';if(raw.indexOf('🥈')!==-1||raw.indexOf('argent')!==-1||raw.indexOf('silver')!==-1)return'silver';if(raw.indexOf('🥉')!==-1||raw.indexOf('bronze')!==-1)return'bronze';var val=compResult(c),m=String(val).match(/(\d+(?:[.,]\d+)?)\s*\/\s*(\d+(?:[.,]\d+)?)/);if(m){var a=Number(m[1].replace(',','.')),b=Number(m[2].replace(',','.'));if(b===20){if(a>=19)return'gold';if(a>=17)return'silver';if(a>=15)return'bronze'}}var n=Number(String(val).replace(',','.'));if(Number.isFinite(n)&&String(val).trim()!==''&&n<=5){if(n>=5)return'gold';if(n>=3)return'silver';if(n>=1)return'bronze'}return'none'}
function medalEmoji(type){return type==='gold'?'🥇':(type==='silver'?'🥈':(type==='bronze'?'🥉':'⬜'))}
function medalLabel(type){return type==='gold'?'Or':(type==='silver'?'Argent':(type==='bronze'?'Bronze':'Sans médaille'))}
function rewardRows(){return studentRows().map(function(r){var medals={gold:0,silver:0,bronze:0,none:0};r.comps.forEach(function(c){medals[medalType(c)]++});return{raw:r.raw,name:r.name,key:r.key,initial:r.initial,active:r.active,comps:r.comps,subjects:r.subjects,subjectNames:r.subjectNames,latest:r.latest,medals:medals,total:r.comps.length,medalized:medals.gold+medals.silver+medals.bronze}})}
function availableRewardSubjects(rows){var map={};rows.forEach(function(r){r.subjectNames.forEach(function(s){map[s]=true})});return Object.keys(map).sort(function(a,b){return a.localeCompare(b,'fr',{sensitivity:'base'})})}
function filteredRewardRows(){var rows=rewardRows();var s=norm(state.rewardSearch);if(s)rows=rows.filter(function(r){var hay=[r.name].concat(r.subjectNames).concat(r.comps.map(compLabel)).join(' ');return norm(hay).indexOf(s)!==-1});if(state.rewardFilter==='with')rows=rows.filter(function(r){return r.total>0});if(state.rewardFilter==='without')rows=rows.filter(function(r){return r.total===0});if(state.rewardFilter==='gold')rows=rows.filter(function(r){return r.medals.gold>0});if(state.rewardFilter==='silver')rows=rows.filter(function(r){return r.medals.silver>0});if(state.rewardFilter==='bronze')rows=rows.filter(function(r){return r.medals.bronze>0});if(state.rewardFilter==='none')rows=rows.filter(function(r){return r.medals.none>0});if(state.rewardSubject!=='all')rows=rows.filter(function(r){return r.subjectNames.some(function(sub){return norm(sub)===norm(state.rewardSubject)})});rows.sort(function(a,b){if(state.rewardSort==='total')return b.total-a.total||a.name.localeCompare(b.name,'fr',{sensitivity:'base'});if(state.rewardSort==='gold')return b.medals.gold-a.medals.gold||b.medals.silver-a.medals.silver||b.medals.bronze-a.medals.bronze||a.name.localeCompare(b.name,'fr',{sensitivity:'base'});if(state.rewardSort==='recent')return dateStamp(compDate(b.latest||{}))-dateStamp(compDate(a.latest||{}))||a.name.localeCompare(b.name,'fr',{sensitivity:'base'});return a.name.localeCompare(b.name,'fr',{sensitivity:'base'})});return rows}
function rewardSubjectChipsHtml(r){if(!r.subjectNames.length)return '<span class="student-empty-data">Aucune matière validée.</span>';return '<div class="subject-chips">'+r.subjectNames.map(function(s){return '<span class="subject-chip">'+esc(s)+' <b>'+r.subjects[s]+'</b></span>'}).join('')+'</div>'}
function rewardItemsHtml(r){if(!r.comps.length)return '<div class="reward-none">Aucune ceinture validée pour le moment.</div>';return '<div class="reward-list">'+r.comps.map(function(c){var type=medalType(c),result=compResult(c),level=compLevel(c);return '<div class="reward-item"><span class="reward-item-icon">'+medalEmoji(type)+'</span><div class="reward-item-main"><b>'+esc(compLabel(c))+'</b><small>'+esc(compSubject(c))+' · '+esc(formatActivityDate(compDate(c)))+'</small></div><span class="reward-item-score">'+esc(result||level||medalLabel(type))+'</span></div>'}).join('')+'</div>'}
function rewardCardHtml(r){var latest=r.latest?medalEmoji(medalType(r.latest))+' <b>'+esc(compLabel(r.latest))+'</b><br>'+esc(compSubject(r.latest))+' · '+esc(formatActivityDate(compDate(r.latest))):'<b>Aucune récompense enregistrée</b><br>Les prochaines ceintures apparaîtront ici.';return '<article class="reward-card"><div class="reward-card-head"><div class="reward-id"><div class="reward-avatar">'+esc((r.initial||r.name.charAt(0)).slice(0,2))+'</div><div><div class="reward-name">'+esc(r.name)+'</div><div class="reward-sub">'+(r.active?'Élève actif':'Élève inactif')+'</div></div></div><span class="reward-total">⭐ '+r.total+' ceinture'+(r.total>1?'s':'')+'</span></div><div class="reward-medals"><div class="reward-medal gold"><b>🥇 '+r.medals.gold+'</b>Or</div><div class="reward-medal silver"><b>🥈 '+r.medals.silver+'</b>Argent</div><div class="reward-medal bronze"><b>🥉 '+r.medals.bronze+'</b>Bronze</div><div class="reward-medal belts"><b>⭐ '+r.total+'</b>Validées</div></div><div class="reward-latest">Dernière récompense : '+latest+'</div>'+rewardSubjectChipsHtml(r)+'<details class="reward-detail"><summary>Voir les récompenses de '+esc(r.name)+'</summary>'+rewardItemsHtml(r)+'</details></article>'}
function rewardTableHtml(rows){return '<div class="table-wrap"><table class="reward-table"><thead><tr><th>Élève</th><th>🥇 Or</th><th>🥈 Argent</th><th>🥉 Bronze</th><th>Ceintures</th><th>Matières</th><th>Dernière récompense</th></tr></thead><tbody>'+rows.map(function(r){return '<tr><td><strong>'+esc(r.name)+'</strong></td><td class="medal-cell">'+r.medals.gold+'</td><td class="medal-cell">'+r.medals.silver+'</td><td class="medal-cell">'+r.medals.bronze+'</td><td><strong>'+r.total+'</strong>'+(r.medals.none?' <span class="pill privee">'+r.medals.none+' sans médaille</span>':'')+'</td><td>'+rewardSubjectChipsHtml(r)+'</td><td>'+(r.latest?medalEmoji(medalType(r.latest))+' <strong>'+esc(compLabel(r.latest))+'</strong><br><span class="student-empty-data">'+esc(compSubject(r.latest))+' · '+esc(formatActivityDate(compDate(r.latest)))+'</span>':'<span class="student-empty-data">Aucune</span>')+'</td></tr>'}).join('')+'</tbody></table></div>'}
function renderRewardResults(){var all=rewardRows(),rows=filteredRewardRows(),results=$('rewardsResults'),line=$('rewardResultCount');if(line)line.textContent=rows.length+' élève'+(rows.length>1?'s':'')+' affiché'+(rows.length>1?'s':'')+' sur '+all.length;if(results)results.innerHTML=rows.length?(state.rewardView==='table'?rewardTableHtml(rows):'<div class="reward-cards">'+rows.map(rewardCardHtml).join('')+'</div>'):'<div class="empty">Aucun élève ne correspond aux filtres.</div>';document.querySelectorAll('.reward-view-switch .btn').forEach(function(b){b.classList.toggle('active',b.dataset.rewardView===state.rewardView)})}
function exportRewards(){var rows=filteredRewardRows();var data=[['Prénom','Or','Argent','Bronze','Sans médaille','Ceintures validées','Matières','Dernière compétence','Dernière matière','Dernière date']].concat(rows.map(function(r){return[r.name,r.medals.gold,r.medals.silver,r.medals.bronze,r.medals.none,r.total,r.subjectNames.join(', '),r.latest?compLabel(r.latest):'',r.latest?compSubject(r.latest):'',r.latest?compDate(r.latest):'']}));var csv=data.map(function(line){return line.map(function(c){return '"'+String(c==null?'':c).replace(/"/g,'""')+'"'}).join(';')}).join('\n');var blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='maitre_hibou_recompenses.csv';a.click();setTimeout(function(){URL.revokeObjectURL(url)},0)}
function renderRewards(){var rows=rewardRows(),subjects=availableRewardSubjects(rows);$('content').innerHTML='<div class="section-title"><div><h2>🏆 Récompenses</h2><p>Les médailles et les ceintures validées de chaque élève, en cartes ou en tableau.</p></div><div class="top-actions"><button class="btn" id="exportRewards">⬇ Exporter</button><button class="btn primary" id="loadRewards">🔄 Actualiser</button></div></div>'+(state.studentsError?'<div class="error">'+esc(state.studentsError)+'</div>':'')+(state.studentsLoading?'<div class="loading">Chargement des élèves et des récompenses...</div>':(!state.studentsLoaded?'<div class="note"><b>Le module Récompenses est prêt.</b> Clique sur « Actualiser » pour charger les médailles et les ceintures.</div>':'<div class="teacher-hint"><b>Barème des ceintures :</b> 15–16/20 🥉 Bronze · 17–18/20 🥈 Argent · 19–20/20 🥇 Or. Les anciennes validations sans médaille restent visibles.</div><div class="reward-toolbar"><input id="rewardSearch" placeholder="Rechercher un élève, une compétence..." value="'+esc(state.rewardSearch)+'"><select id="rewardFilter"><option value="all">Tous les élèves</option><option value="with">Avec récompense</option><option value="without">Sans récompense</option><option value="gold">Avec médaille d’or</option><option value="silver">Avec médaille d’argent</option><option value="bronze">Avec médaille de bronze</option><option value="none">Validation sans médaille</option></select><select id="rewardSubject"><option value="all">Toutes les matières</option>'+subjects.map(function(s){return '<option value="'+esc(s)+'">'+esc(s)+'</option>'}).join('')+'</select><select id="rewardSort"><option value="name">Tri alphabétique</option><option value="total">Plus de ceintures</option><option value="gold">Plus de médailles d’or</option><option value="recent">Récompense la plus récente</option></select></div><div class="reward-result-line"><span id="rewardResultCount"></span><div class="reward-view-switch"><button class="btn small" data-reward-view="cards">▦ Cartes</button><button class="btn small" data-reward-view="table">☷ Tableau</button></div><span>Dernière actualisation : '+esc(state.studentsLastLoad||'—')+'</span></div><div id="rewardsResults"></div>'));$('loadRewards').onclick=loadStudents;$('exportRewards').onclick=exportRewards;if(!state.studentsLoading&&state.studentsLoaded){$('rewardFilter').value=state.rewardFilter;$('rewardSubject').value=state.rewardSubject;$('rewardSort').value=state.rewardSort;$('rewardSearch').oninput=function(){state.rewardSearch=this.value;renderRewardResults()};$('rewardFilter').onchange=function(){state.rewardFilter=this.value;renderRewardResults()};$('rewardSubject').onchange=function(){state.rewardSubject=this.value;renderRewardResults()};$('rewardSort').onchange=function(){state.rewardSort=this.value;renderRewardResults()};document.querySelectorAll('[data-reward-view]').forEach(function(b){b.onclick=function(){state.rewardView=b.dataset.rewardView;renderRewardResults()}});renderRewardResults()}syncMenuActive()}
function renderSecurity(){ $('content').innerHTML='<div class="section-title"><div><h2>🛡️ Sécurité CE2</h2><p>Contrôles importants de l’architecture actuelle.</p></div></div><div class="cards"><div class="qcard"><strong>✅ Espace enseignant séparé</strong><p>Le gros tableau enseignant n’est plus ouvert dans index.html. L’appui long ouvre cette page dédiée.</p></div><div class="qcard"><strong>✅ Boîte à questions élève séparée</strong><p>La page boite_questions.html appelle Apps Script comme API, puis Mistral côté serveur Google.</p></div><div class="qcard"><strong>🧪 Phase de test</strong><p>Le mot de passe est désactivé pour faciliter les essais. On remettra une protection lorsque l’espace enseignant sera stabilisé.</p></div></div>'; }
function syncMenuActive(){document.querySelectorAll('.tab').forEach(function(b){var active=false;if(b.classList.contains('qview'))active=state.tab==='questions'&&b.dataset.view===state.filter;else active=b.dataset.tab===state.tab;b.classList.toggle('active',active);});}
function switchTab(t){state.tab=t;syncMenuActive();render();if(t==='questions'&&!state.questions.length)loadQuestions();if((t==='students'||t==='rewards')&&!state.studentsLoaded&&!state.studentsLoading)loadStudents();}
function switchQuestionView(view){state.tab='questions';state.filter=view||'todo';syncMenuActive();renderQuestions();if(!state.questions.length)loadQuestions();}
document.querySelectorAll('.main-tab').forEach(function(b){b.onclick=function(){switchTab(b.dataset.tab)}});
document.querySelectorAll('.qview').forEach(function(b){b.onclick=function(){switchQuestionView(b.dataset.view)}});
$('reloadBtn').onclick=function(){ if(state.tab==='questions')loadQuestions(); else if(state.tab==='students'||state.tab==='rewards')loadStudents(); else render(); };
syncMenuActive();render();loadQuestions();
})();
</script>
