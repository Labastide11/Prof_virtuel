<style>

*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:var(--ink);background:linear-gradient(135deg,#eceaff,#fff7d7 48%,#f8fbff)}body{min-height:100vh}.app{min-height:100vh;display:flex;flex-direction:column}.top{position:sticky;top:0;z-index:30;background:#fff;box-shadow:var(--shadow);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px}.brand{display:flex;align-items:center;gap:12px}.owl{font-size:42px;background:#f0edff;border:2px solid var(--line);border-radius:18px;width:64px;height:64px;display:grid;place-items:center}.brand h1{font-size:24px;line-height:1.05;margin:0;color:var(--primary);font-weight:1000}.brand small{display:block;color:var(--muted);font-weight:850;margin-top:3px}.top-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.btn{border:0;border-radius:14px;padding:11px 14px;min-height:42px;font:inherit;font-weight:950;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:7px;background:#fff;color:var(--primary);border:2px solid var(--line);box-shadow:0 6px 16px rgba(45,35,110,.07)}.btn.primary{background:linear-gradient(135deg,var(--primary),#8b6cff);color:#fff;border-color:transparent}.btn.ok{background:#dcfce7;color:#166534;border-color:#86efac}.btn.warn{background:#fff7ed;color:#9a3412;border-color:#fed7aa}.btn.bad{background:#fee2e2;color:#991b1b;border-color:#fecaca}.btn.private{background:#e2e8f0;color:#334155;border-color:#cbd5e1}.btn.small{font-size:13px;min-height:34px;padding:7px 10px;border-radius:11px}.main{width:min(1240px,100%);margin:0 auto;padding:16px;display:grid;grid-template-columns:230px minmax(0,1fr);gap:16px;flex:1}.side{background:rgba(255,255,255,.86);border:2px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:12px;height:max-content;position:sticky;top:100px}.tab{width:100%;display:flex;align-items:center;gap:8px;text-align:left;background:#fff;border:2px solid transparent;border-radius:15px;padding:12px;margin:5px 0;color:var(--ink);font-weight:1000;cursor:pointer}.tab.active{background:#f0edff;border-color:#cfc7ff;color:var(--primary)}.tab span{font-size:20px}.content{min-width:0;background:rgba(255,255,255,.9);border:2px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}.section-title{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;border-bottom:2px solid var(--line);padding-bottom:12px;margin-bottom:14px}.section-title h2{font-size:28px;line-height:1.05;margin:0;color:var(--primary);font-weight:1000}.section-title p{margin:6px 0 0;color:var(--muted);font-weight:850;line-height:1.3}.grid-stats{display:grid;grid-template-columns:repeat(6,minmax(110px,1fr));gap:10px;margin:12px 0}.stat{background:#fff;border:2px solid var(--line);border-radius:16px;padding:11px;text-align:center;font-weight:1000}.stat b{display:block;color:var(--primary);font-size:25px}.filters{display:grid;grid-template-columns:minmax(180px,1fr) 180px 180px auto;gap:8px;align-items:center;background:#f8f7ff;border:2px solid var(--line);border-radius:18px;padding:10px;margin:12px 0}input,select{border:2px solid #dcd5ff;border-radius:13px;padding:10px 12px;font:inherit;font-weight:850;background:#fff;color:var(--ink);min-height:42px}.status-line{font-size:13px;color:var(--muted);font-weight:850;margin:8px 0}.cards{display:grid;gap:10px}.qcard{background:#fff;border:2px solid var(--line);border-radius:18px;padding:13px;box-shadow:0 8px 20px rgba(45,35,110,.06)}.qhead{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.qmeta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:1000;background:#f1f5f9;color:#334155}.pill.classe{background:#dcfce7;color:#166534}.pill.privee{background:#e2e8f0;color:#334155}.pill.vedette{background:#fff7d6;color:#7a5200}.pill.nouvelle{background:#eef2ff;color:#3730a3}.pill.aexpliquer{background:#fff7ed;color:#9a3412}.pill.expliquee{background:#dcfce7;color:#166534}.qtext{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:8px 0}.qbox{background:#f8f7ff;border:2px solid #ece8ff;border-radius:14px;padding:10px;font-weight:850;line-height:1.35}.qbox strong{display:block;color:var(--primary);margin-bottom:4px}.qactions{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}.answer{margin-top:10px}.answer summary{cursor:pointer;font-weight:1000;color:var(--primary)}.answer div{background:#fffaf0;border:2px solid #fde68a;border-radius:14px;padding:10px;margin-top:7px;font-weight:850;line-height:1.35}.empty,.loading,.error{border:2px dashed var(--line);border-radius:18px;padding:18px;text-align:center;font-weight:950;color:var(--muted);background:#fff}.error{border-color:#fecaca;background:#fff1f2;color:#991b1b}.table-wrap{overflow:auto;border:2px solid var(--line);border-radius:16px;background:#fff}table{border-collapse:collapse;width:100%;font-size:14px}th,td{padding:9px;border-bottom:1px solid #eee9ff;text-align:left;white-space:nowrap}th{background:#f8f7ff;color:var(--primary);font-weight:1000}.gate{position:fixed;inset:0;background:linear-gradient(135deg,#17134a,#6c63ff);z-index:100;display:grid;place-items:center;padding:18px}.gate.hidden{display:none}.gatebox{width:min(430px,100%);background:#fff;border:3px solid var(--gold);border-radius:28px;padding:24px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.25)}.gatebox .bigowl{font-size:64px}.gatebox h2{margin:6px 0;color:var(--primary);font-size:28px}.gatebox p{color:var(--muted);font-weight:850}.gatebox input{text-align:center;width:100%;font-size:20px}.gate-error{min-height:22px;color:var(--bad);font-weight:1000;margin:8px 0}.note{background:#fff8d6;border:2px solid #fde68a;border-radius:16px;padding:12px;font-weight:850;color:#6a4a00;line-height:1.35}.hidden{display:none!important}@media(max-width:880px){.main{grid-template-columns:1fr;padding:10px}.side{position:static;display:grid;grid-template-columns:repeat(2,1fr);gap:6px}.tab{margin:0;padding:10px}.grid-stats{grid-template-columns:repeat(2,1fr)}.filters{grid-template-columns:1fr}.qtext{grid-template-columns:1fr}.top{align-items:flex-start}.brand h1{font-size:19px}.owl{width:52px;height:52px;font-size:34px}.section-title{display:block}.top-actions{justify-content:flex-start}.content{padding:12px}}@media(max-width:520px){.side{grid-template-columns:1fr}.grid-stats{grid-template-columns:1fr}.qhead{display:block}.top{display:block}.top-actions{margin-top:8px}.btn{width:100%;justify-content:center}.btn.small{width:auto}.qactions .btn{width:auto}}
</style>

<body>
<div class="gate" id="gate">
  <div class="gatebox">
    <div class="bigowl">🦉</div>
    <h2>Espace enseignant</h2>
    <p>Accès séparé de Maître Hibou pour éviter d'alourdir l'espace élève.</p>
    <input id="teacherCode" type="password" placeholder="Code enseignant" autocomplete="off">
    <div class="gate-error" id="gateError"></div>
    <button class="btn primary" id="enterBtn">Entrer</button>
    <p style="font-size:12px">V25.6.0 · page dédiée</p>
  </div>
</div>
<div class="app">
  <header class="top">
    <div class="brand"><div class="owl">🦉</div><div><h1>Espace enseignant</h1><small>Maître Hibou V25.6.0 — page séparée</small></div></div>
    <div class="top-actions"><button class="btn" id="reloadBtn">🔄 Actualiser</button><a class="btn" href="index.html?v=2560">↩ Retour élève</a></div>
  </header>
  <main class="main">
    <nav class="side" aria-label="Onglets enseignant">
      <button class="tab active" data-tab="questions"><span>📦</span>Boîte à questions</button>
      <button class="tab" data-tab="students"><span>👥</span>Suivi élèves</button>
      <button class="tab" data-tab="rewards"><span>🏆</span>Récompenses</button>
      <button class="tab" data-tab="security"><span>🛡️</span>Sécurité CE2</button>
    </nav>
    <section class="content" id="content"></section>
  </main>
</div>
<script>
(function(){
'use strict';
var QUESTION_API='https://script.google.com/macros/s/AKfycbwGcErZ0he06Dg_bpPDaHtPHa6fAcDQ-31tB7Rlr9w2JZcNaQnP9YIABJYf-CKpFfpF/exec';
var STUDENTS_API='https://script.google.com/macros/s/AKfycbxz1vYS24sv-c3XVja12geWEXIQl6bQyBoQKBx5kg_fwQaj80_Oc7Y34yeBSRN4lF1f/exec';
var TEACHER_CODE='hibou';
var state={tab:'questions',questions:[],students:[],competences:[],loading:false,error:'',filter:'todo',search:'',matiere:'',visibility:'',status:'',method:'',lastLoad:null};
function $(id){return document.getElementById(id)}
function esc(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function clean(v){return String(v==null?'':v).trim()}
function norm(v){return clean(v).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}
function jsonp(url,params,timeout){timeout=timeout||25000;return new Promise(function(resolve,reject){var cb='__hibouT'+Date.now()+Math.floor(Math.random()*1e6);params=params||{};params.callback=cb;params.t=Date.now();var s=document.createElement('script');var done=false;var timer=setTimeout(function(){if(done)return;done=true;cleanup();reject(new Error('Délai dépassé'));},timeout);function cleanup(){clearTimeout(timer);try{delete window[cb]}catch(e){} if(s&&s.parentNode)s.parentNode.removeChild(s)}window[cb]=function(data){if(done)return;done=true;cleanup();resolve(data)};s.onerror=function(){if(done)return;done=true;cleanup();reject(new Error('Erreur réseau JSONP'))};s.src=url+'?'+new URLSearchParams(params).toString();document.head.appendChild(s);});}
function checkGate(){try{if(sessionStorage.getItem('hibou_teacher_gate_v260')==='ok'){openGate();return}}catch(e){};}
function openGate(){ $('gate').classList.add('hidden'); }
function tryEnter(){var code=norm($('teacherCode').value); if(code!==norm(TEACHER_CODE)){ $('gateError').textContent='Code incorrect.'; return;} try{sessionStorage.setItem('hibou_teacher_gate_v260','ok')}catch(e){} openGate(); render(); if(!state.questions.length) loadQuestions();}
function fmtDate(v){if(!v)return '—'; var s=String(v); if(/^\d{4}-\d{2}-\d{2}/.test(s)){var d=new Date(s); if(!isNaN(d)) return d.toLocaleDateString('fr-FR')+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});} return s}
function vis(q){return clean(q['Visibilité']||q.Visibilite||q.visibilite||q.visibility||'classe')}
function stat(q){return clean(q['Statut']||q.statut||q.status||'nouvelle')}
function mat(q){return clean(q['Matière']||q.Matiere||q.matiere||q.subject||'Boîte à questions')}
function prenom(q){return clean(q['Prénom']||q.Prenom||q.prenom||q.eleve||q.student||'')}
function qorig(q){return clean(q['Question originale']||q.questionOriginale||q.question_originale||q.question||'')}
function qcorr(q){return clean(q['Question corrigée']||q.questionCorrigee||q.question_corrigee||q.correctedQuestion||'')}
function ans(q){return clean(q['Réponse IA']||q['Reponse IA']||q.reponseIA||q.reponse_ia||q.aiAnswer||'')}
function row(q){return q.rowIndex||q.ligne||q.row||''}
function isPrivate(q){return norm(vis(q)).indexOf('prive')!==-1}
function isStar(q){return norm(vis(q)).indexOf('vedette')!==-1}
function isClass(q){return !isPrivate(q)&&!isStar(q)}
function isExplained(q){return norm(stat(q)).indexOf('expliquee')!==-1}
function isToExplain(q){return norm(stat(q)).indexOf('expliquer')!==-1}
function isNew(q){return norm(stat(q)).indexOf('nouvelle')!==-1||!stat(q)}
function counts(){var qs=state.questions;return{total:qs.length,todo:qs.filter(function(q){return !isExplained(q)}).length,classe:qs.filter(isClass).length,priv:qs.filter(isPrivate).length,star:qs.filter(isStar).length,done:qs.filter(isExplained).length}}
function filteredQuestions(){var qs=state.questions.slice().reverse(); if(state.filter==='todo')qs=qs.filter(function(q){return !isExplained(q)}); if(state.filter==='classe')qs=qs.filter(isClass); if(state.filter==='private')qs=qs.filter(isPrivate); if(state.filter==='star')qs=qs.filter(isStar); if(state.filter==='done')qs=qs.filter(isExplained); if(state.visibility)qs=qs.filter(function(q){return norm(vis(q))===norm(state.visibility)}); if(state.status)qs=qs.filter(function(q){return norm(stat(q))===norm(state.status)}); if(state.matiere)qs=qs.filter(function(q){return norm(mat(q)).indexOf(norm(state.matiere))!==-1}); if(state.search){var s=norm(state.search); qs=qs.filter(function(q){return [prenom(q),mat(q),qorig(q),qcorr(q),ans(q),vis(q),stat(q)].join(' ').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').indexOf(s)!==-1})} return qs}
function render(){ if(state.tab==='questions')renderQuestions(); else if(state.tab==='students')renderStudents(); else if(state.tab==='rewards')renderRewards(); else renderSecurity(); }
function renderQuestions(){var c=counts();var items=filteredQuestions();$('content').innerHTML='<div class="section-title"><div><h2>📦 Boîte à questions</h2><p>Vision globale : questions de classe, privées, vedettes et questions à expliquer.</p></div><button class="btn primary" id="loadQ">🔄 Recharger</button></div>'+statsHtml(c)+'<div class="filters"><input id="search" placeholder="Rechercher : prénom, question, matière..." value="'+esc(state.search)+'"><select id="filter"><option value="todo">À traiter</option><option value="classe">Questions de classe</option><option value="private">Questions privées</option><option value="star">Questions vedettes</option><option value="done">Expliquées</option><option value="all">Toutes les questions</option></select><input id="matiere" placeholder="Matière" value="'+esc(state.matiere)+'"><button class="btn" id="exportCsv">⬇ CSV</button></div><div class="status-line">'+(state.loading?'Chargement en cours...':'Méthode : '+esc(state.method||'—')+' · Dernier chargement : '+esc(state.lastLoad||'—'))+'</div>'+(state.error?'<div class="error">'+esc(state.error)+'</div>':'')+(state.loading?'<div class="loading">Chargement du journal des questions...</div>':(items.length?'<div class="cards">'+items.map(cardHtml).join('')+'</div>':'<div class="empty">Aucune question dans cette vue.</div>'));$('filter').value=state.filter;$('search').oninput=function(){state.search=this.value;renderQuestions()};$('filter').onchange=function(){state.filter=this.value;renderQuestions()};$('matiere').oninput=function(){state.matiere=this.value;renderQuestions()};$('loadQ').onclick=loadQuestions;$('exportCsv').onclick=exportQuestions;bindCardButtons();}
function statsHtml(c){var cells=[['Total',c.total],['À traiter',c.todo],['Classe',c.classe],['Privées',c.priv],['Vedettes',c.star],['Expliquées',c.done]];return '<div class="grid-stats">'+cells.map(function(x){return '<div class="stat"><b>'+x[1]+'</b>'+x[0]+'</div>'}).join('')+'</div>'}
function pillVis(q){var v=vis(q);var cls=isStar(q)?'vedette':(isPrivate(q)?'privee':'classe');return '<span class="pill '+cls+'">'+esc(v||'classe')+'</span>'}
function pillStat(q){var s=stat(q)||'nouvelle';var n=norm(s);var cls=n.indexOf('expliquer')!==-1?'aexpliquer':(n.indexOf('expliquee')!==-1?'expliquee':'nouvelle');return '<span class="pill '+cls+'">'+esc(s)+'</span>'}
function cardHtml(q){var r=row(q);return '<article class="qcard" data-row="'+esc(r)+'"><div class="qhead"><div><div class="qmeta"><span class="pill">👤 '+esc(prenom(q)||'—')+'</span><span class="pill">📚 '+esc(mat(q)||'—')+'</span>'+pillVis(q)+pillStat(q)+'<span class="pill">🕒 '+esc(fmtDate((q.Date||'' )+' '+(q.Heure||'')))+'</span></div></div><span class="pill">ligne '+esc(r)+'</span></div><div class="qtext"><div class="qbox"><strong>Question originale</strong>'+esc(qorig(q)||'—')+'</div><div class="qbox"><strong>Question corrigée</strong>'+esc(qcorr(q)||'—')+'</div></div>'+(ans(q)?'<details class="answer"><summary>Voir la réponse IA / note enseignant</summary><div>'+esc(ans(q))+'</div></details>':'')+'<div class="qactions"><button class="btn small ok" data-act="vis" data-val="classe">👥 Classe</button><button class="btn small private" data-act="vis" data-val="privée">🔒 Privée</button><button class="btn small warn" data-act="vis" data-val="vedette">⭐ Vedette</button><button class="btn small" data-act="stat" data-val="nouvelle">Nouvelle</button><button class="btn small warn" data-act="stat" data-val="à_expliquer">À expliquer</button><button class="btn small ok" data-act="stat" data-val="expliquée">Expliquée</button></div></article>'}
function bindCardButtons(){document.querySelectorAll('.qcard .btn[data-act]').forEach(function(b){b.onclick=function(){var art=b.closest('.qcard');var r=art&&art.dataset.row;if(!r)return;var p={action:'updateQuestion',rowIndex:r}; if(b.dataset.act==='vis')p.visibilite=b.dataset.val; if(b.dataset.act==='stat')p.statut=b.dataset.val; updateQuestion(p);};});}
function loadQuestions(){state.loading=true;state.error='';renderQuestions();var attempts=[{}, {action:'listQuestions'}, {type:'listQuestions'}];function tryOne(i){if(i>=attempts.length){state.loading=false;state.error='Impossible de charger le journal des questions.';renderQuestions();return} var params=attempts[i];jsonp(QUESTION_API,params,22000).then(function(data){var qs=data&&data.questions;if(!Array.isArray(qs)){tryOne(i+1);return} state.questions=qs;state.method=params.action?'action=listQuestions':(params.type?'type=listQuestions':'doGet par défaut');state.lastLoad=new Date().toLocaleTimeString('fr-FR');state.loading=false;state.error='';renderQuestions();}).catch(function(err){if(i<attempts.length-1)tryOne(i+1);else{state.loading=false;state.error=err.message||String(err);renderQuestions();}})}tryOne(0)}
function updateQuestion(params){var old=state.method;state.method='Mise à jour...';renderQuestions();jsonp(QUESTION_API,params,22000).then(function(data){if(!data||data.success===false)throw new Error(data&&data.error?data.error:'Mise à jour refusée');return loadQuestions();}).catch(function(err){state.method=old;state.error='Mise à jour impossible : '+(err.message||String(err));renderQuestions();});}
function exportQuestions(){var rows=[['Date','Heure','Prénom','Matière','Question originale','Question corrigée','Réponse IA','Visibilité','Statut','Ligne']].concat(state.questions.map(function(q){return[q.Date||'',q.Heure||'',prenom(q),mat(q),qorig(q),qcorr(q),ans(q),vis(q),stat(q),row(q)]}));var csv=rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"'}).join(';')}).join('\n');var blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='maitre_hibou_questions.csv';a.click();URL.revokeObjectURL(url)}
function renderStudents(){ $('content').innerHTML='<div class="section-title"><div><h2>👥 Suivi élèves</h2><p>Page allégée. Elle charge la liste élèves et les compétences validées depuis le script principal.</p></div><button class="btn primary" id="loadStudents">🔄 Charger</button></div><div id="studentsBox">'+(state.students.length?studentsHtml():'<div class="note">Cette page est séparée pour éviter l’usine à gaz. Première étape : affichage simple des élèves actifs et des compétences. Les fonctions avancées pourront être ajoutées ensuite.</div>')+'</div>';$('loadStudents').onclick=loadStudents;}
function studentsHtml(){return '<div class="grid-stats"><div class="stat"><b>'+state.students.length+'</b>élèves actifs</div><div class="stat"><b>'+state.competences.length+'</b>validations</div></div><div class="table-wrap"><table><thead><tr><th>Prénom</th><th>Initiale</th><th>Naissance</th><th>Sexe</th><th>Actif</th></tr></thead><tbody>'+state.students.map(function(s){return '<tr><td><strong>'+esc(s.prenom)+'</strong></td><td>'+esc(s.initiale||'')+'</td><td>'+esc(s.naissance||'')+'</td><td>'+esc(s.sexe||'')+'</td><td>'+esc(s.actif||'')+'</td></tr>'}).join('')+'</tbody></table></div>'}
function loadStudents(){ $('studentsBox').innerHTML='<div class="loading">Chargement des élèves...</div>';Promise.all([jsonp(STUDENTS_API,{},22000),jsonp(STUDENTS_API,{action:'competences'},22000)]).then(function(res){state.students=Array.isArray(res[0])?res[0]:[];state.competences=Array.isArray(res[1])?res[1]:[];renderStudents();}).catch(function(err){$('studentsBox').innerHTML='<div class="error">Chargement impossible : '+esc(err.message||String(err))+'</div>';});}
function renderRewards(){ $('content').innerHTML='<div class="section-title"><div><h2>🏆 Récompenses</h2><p>Module séparé prêt à construire.</p></div></div><div class="note">Pour la fiabilité, on détache d’abord l’espace enseignant. Les récompenses pourront être reconstruites proprement ici sans toucher à l’espace élève.</div>'; }
function renderSecurity(){ $('content').innerHTML='<div class="section-title"><div><h2>🛡️ Sécurité CE2</h2><p>Contrôles importants de l’architecture actuelle.</p></div></div><div class="cards"><div class="qcard"><strong>✅ Espace enseignant séparé</strong><p>Le gros tableau enseignant n’est plus ouvert dans index.html. L’appui long ouvre cette page dédiée.</p></div><div class="qcard"><strong>✅ Boîte à questions élève séparée</strong><p>La page boite_questions.html appelle Apps Script comme API, puis Mistral côté serveur Google.</p></div><div class="qcard"><strong>⚠️ Code côté navigateur</strong><p>Le code d’accès est une sécurité légère adaptée à la classe. Pour une sécurité forte, il faudra une authentification serveur.</p></div></div>'; }
function switchTab(t){state.tab=t;document.querySelectorAll('.tab').forEach(function(b){b.classList.toggle('active',b.dataset.tab===t)});render();if(t==='questions'&&!state.questions.length)loadQuestions();}
document.querySelectorAll('.tab').forEach(function(b){b.onclick=function(){switchTab(b.dataset.tab)}});
$('reloadBtn').onclick=function(){ if(state.tab==='questions')loadQuestions(); else if(state.tab==='students')loadStudents(); else render(); };
$('enterBtn').onclick=tryEnter;$('teacherCode').addEventListener('keydown',function(e){if(e.key==='Enter')tryEnter()});
checkGate();render();if($('gate').classList.contains('hidden'))loadQuestions();
})();
</script>
</body>
</html>
