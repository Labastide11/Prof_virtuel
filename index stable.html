


<!-- PATCH V25.7.60 - Clic bloc Mes médailles : suppression définitive des anciens gestionnaires -->
<script id="patch-v25760-clic-medailles-final">
(function(){
  if(window.__patchV25760MedalsFinal) return;
  window.__patchV25760MedalsFinal=true;

  function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function norm(v){return String(v||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
  function medalKey(v){var s=norm(v);if(s.indexOf('or')>=0||s.indexOf('gold')>=0||s.indexOf('🥇')>=0)return'or';if(s.indexOf('argent')>=0||s.indexOf('silver')>=0||s.indexOf('🥈')>=0)return'argent';if(s.indexOf('bronze')>=0||s.indexOf('🥉')>=0)return'bronze';return'';}
  function currentName(){
    var c=[window.currentStudentName,window.currentStudent,window.eleveActuel,window.prenomEleve];
    for(var i=0;i<c.length;i++){if(typeof c[i]==='string'&&c[i].trim())return c[i].trim();}
    try{var keys=['prenom','studentName','eleve','currentStudentName','hibou_prenom'];for(var j=0;j<keys.length;j++){var v=localStorage.getItem(keys[j]);if(v&&v.trim())return v.trim();}}catch(e){}
    var el=document.querySelector('#mockupProfileName,.profile-name,[data-student-name]');return el?String(el.textContent||'').trim():'élève';
  }
  function rows(){try{return typeof window.hibouV195BestRows==='function'?(window.hibouV195BestRows()||[]):[];}catch(e){return[];}}
  function close(){var el=document.getElementById('podiumV25760Overlay');if(el)el.remove();var old=document.getElementById('podiumV25758Overlay');if(old)old.remove();var legacy=document.getElementById('podiumV1853Overlay');if(legacy)legacy.remove();}
  function render(){
    close();
    var name=currentName(),data=rows(),counts={or:0,argent:0,bronze:0};
    data.forEach(function(r){var k=medalKey(r.medal||r.medaille||r.rank);if(counts[k]!=null)counts[k]++;});
    var table=data.map(function(r){var score=r.validations||(r.score!=null&&r.total!=null?r.score+'/'+r.total:(r.score!=null?r.score:''));return '<tr><td><strong>'+esc(r.domaine||r.domain||'-')+'</strong></td><td>'+esc(r.competence||r.title||'Compétence')+'</td><td>'+esc(r.medaille||r.medal||'🏅')+'</td><td>'+esc(score)+'</td></tr>';}).join('');
    var ov=document.createElement('div');ov.id='podiumV25760Overlay';ov.className='podium-v1853-overlay';
    ov.innerHTML='<div class="podium-v1853-modal" role="dialog" aria-modal="true"><button class="podium-v1853-close" type="button" aria-label="Fermer">×</button><div class="podium-v1853-title">🏆 Mes ceintures validées</div><div class="podium-v1853-subtitle">Un tableau personnel : pas de classement, pas de compétition.</div>'+
    (data.length?'<div class="podium-v1853-hero"><div class="podium-v1853-cup">🏆</div><div class="podium-v1853-student">Bravo '+esc(name)+' !</div><div class="podium-v1853-total">⭐ Total : '+data.length+' ceinture'+(data.length>1?'s':'')+' validée'+(data.length>1?'s':'')+'</div></div><div class="podium-v1853-medals"><div class="podium-v1853-medal"><span class="emoji">🥇</span><div class="label">Or</div><div class="count">'+counts.or+'</div></div><div class="podium-v1853-medal"><span class="emoji">🥈</span><div class="label">Argent</div><div class="count">'+counts.argent+'</div></div><div class="podium-v1853-medal"><span class="emoji">🥉</span><div class="label">Bronze</div><div class="count">'+counts.bronze+'</div></div></div><div class="podium-v1853-list"><div class="podium-v1853-list-title">🎖️ Les meilleures réussites de '+esc(name)+'</div><table class="podium-v1853-table"><thead><tr><th>Domaine</th><th>Compétence</th><th>Médaille</th><th>Résultat</th></tr></thead><tbody>'+table+'</tbody></table></div><div class="podium-v1853-footer">🦉 Si tu repasses une ceinture, seule ta meilleure médaille est comptée.</div>':'<div class="podium-v1853-empty">🥋 '+esc(name)+', tu n’as pas encore de ceinture validée.<br>Continue les entraînements : tes réussites apparaîtront ici.</div>')+'</div>';
    ov.querySelector('.podium-v1853-close').onclick=close;ov.addEventListener('click',function(e){if(e.target===ov)close();});document.body.appendChild(ov);
  }
  async function open(){
    close();
    try{if(typeof window.refreshStudentBeltsV25620==='function')await window.refreshStudentBeltsV25620(true);}catch(e){console.warn('Actualisation des ceintures impossible',e);}
    render();
  }
  function replaceCard(){
    var old=document.getElementById('mockupCompetencesCard');if(!old||old.dataset.v25760Medals==='1')return;
    var clone=old.cloneNode(true);clone.dataset.v25760Medals='1';clone.setAttribute('role','button');clone.setAttribute('tabindex','0');clone.setAttribute('title','Voir mes ceintures validées');
    old.replaceWith(clone);
    clone.onclick=function(e){e.preventDefault();e.stopPropagation();open();};
    clone.onkeydown=function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();e.stopPropagation();open();}};
  }
  function intercept(e){var card=e.target&&e.target.closest&&e.target.closest('#mockupCompetencesCard');if(!card)return;e.preventDefault();e.stopPropagation();e.stopImmediatePropagation();open();}
  window.addEventListener('click',intercept,true);
  window.addEventListener('keydown',function(e){var card=e.target&&e.target.closest&&e.target.closest('#mockupCompetencesCard');if(!card||(e.key!=='Enter'&&e.key!==' '))return;e.preventDefault();e.stopPropagation();e.stopImmediatePropagation();open();},true);
  replaceCard();
  new MutationObserver(replaceCard).observe(document.documentElement,{childList:true,subtree:true});
  setTimeout(replaceCard,100);setTimeout(replaceCard,600);setTimeout(replaceCard,1800);
  window.openStudentBeltsV25760=open;
})();
</script>
