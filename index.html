<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mon Prof Virtuel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght=400;600;700;800;900&family=Baloo+2:wght=700;800&display=swap');

  :root {
    --primary: #6C63FF;
    --primary-light: #EAE8FF;
    --secondary: #FF6B6B;
    --accent: #FFD93D;
    --green: #6BCB77;
    --bg: #F7F6FF;
    --card: #FFFFFF;
    --text: #2D2B55;
    --text-muted: #8B89A8;
    --radius: 20px;
    --shadow: 0 4px 20px rgba(108,99,255,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  header {
    background: var(--card);
    padding: 12px 16px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo-area { display: flex; align-items: center; gap: 8px; }
  .logo-icon { font-size: 28px; }
  .logo-text { font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 20px; color: var(--primary); line-height: 1; }

  .header-actions { display: flex; align-items: center; gap: 10px; }

  .badge {
    background: var(--primary-light);
    color: var(--primary);
    padding: 6px 12px;
    border-radius: 50px;
    font-weight: 800;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    box-shadow: inset 0 2px 4px rgba(108,99,255,0.06);
  }
  .badge.score { background: #FFF9E6; color: #D4A300; }
  
  /* Animation de sursaut du score */
  @keyframes bump {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  .badge.score.bump { animation: bump 0.3s ease-out; }

  .btn-round {
    background: var(--card);
    border: 2px solid var(--primary-light);
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-round:hover { background: var(--primary-light); border-color: var(--primary); }
  .btn-round.muted { color: var(--text-muted); border-color: #ECEBF3; background: #F4F3F8; }

  /* Sélecteur de Matières horizontal */
  .subjects-bar {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    overflow-x: auto;
    white-space: nowrap;
    scrollbar-width: none;
  }
  .subjects-bar::-webkit-scrollbar { display: none; }
  
  .subject-btn {
    background: var(--card);
    border: 2px solid transparent;
    padding: 8px 14px;
    border-radius: 50px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .subject-btn.active { background: var(--primary); color: white; }
  .subject-btn:not(.active):hover { transform: translateY(-2px); border-color: var(--primary-light); }

  /* Zone de Chat */
  .chat-container {
    flex: 1;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
    max-width: 768px;
    width: 100%;
    margin: 0 auto;
  }

  .message { display: flex; gap: 12px; max-width: 85%; animation: fadeIn 0.3s ease-out forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .message.prof { align-self: flex-start; }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: var(--shadow);
    flex-shrink: 0;
  }
  .avatar.prof { background: #EAE8FF; }
  .avatar.user { background: #FFD93D; }

  .bubble {
    background: var(--card);
    padding: 12px 16px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    font-size: 15px;
    line-height: 1.5;
    font-weight: 600;
    position: relative;
  }
  .message.prof .bubble { border-top-left-radius: 4px; background: var(--card); }
  .message.user .bubble { border-top-right-radius: 4px; background: var(--primary); color: white; }

  /* Questions rapides pré-configurées */
  .quick-questions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 16px 12px 16px;
    max-width: 768px;
    width: 100%;
    margin: 0 auto;
  }
  .quick-btn {
    background: #EAE8FF;
    border: none;
    color: var(--primary);
    padding: 8px 14px;
    border-radius: 14px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .quick-btn:hover { background: var(--primary); color: white; transform: scale(1.02); }

  /* Barre d'écriture fixe en bas */
  .input-area {
    background: var(--card);
    padding: 12px 16px;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.04);
    position: sticky;
    bottom: 0;
    z-index: 10;
  }
  .input-wrapper {
    max-width: 768px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 8px;
    background: #F4F3F8;
    padding: 6px 10px;
    border-radius: 30px;
    border: 2px solid transparent;
    transition: all 0.2s;
  }
  .input-wrapper:focus-within { background: var(--card); border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-light); }

  .chat-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    padding: 6px 4px;
    resize: none;
    max-height: 100px;
  }
  .chat-input::placeholder { color: var(--text-muted); }

  .action-btn {
    background: var(--primary);
    color: white;
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .action-btn:hover { transform: scale(1.08); }
  .action-btn.voice { background: var(--secondary); }
  .action-btn.voice.recording { animation: pulse 1.2s infinite; background: #ff3b3b; }
  @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,59,59,0.4); } 70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(255,59,59,0); } 100% { transform: scale(1); } }

  .speech-status {
    position: absolute;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--secondary);
    color: white;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    pointer-events: none;
    box-shadow: var(--shadow);
  }

  /* Indicateur d'écriture (...) */
  .typing-indicator { display: flex; gap: 4px; align-items: center; height: 20px; padding: 0 4px; }
  .typing-indicator span { width: 8px; height: 8px; background: var(--text-muted); border-radius: 50%; opacity: 0.4; animation: wave 1.2s infinite; }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes wave { 0%, 100% { transform: translateY(0); opacity: 0.4; } 50% { transform: translateY(-6px); opacity: 1; } }

  /* Modals plein écran élégants */
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(45,43,85,0.6); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal-overlay.hidden { display: none !important; }
  .modal-box {
    background: var(--card); padding: 30px; border-radius: 24px;
    max-width: 440px; width: 100%; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  
  .modal-box h2 { font-family: 'Baloo 2', sans-serif; font-size: 24px; color: var(--primary); margin-bottom: 8px; }
  .modal-box p { font-weight: 600; font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
  .modal-input {
    width: 100%; padding: 12px 16px; border-radius: 14px;
    border: 2px solid var(--primary-light); font-family: inherit;
    font-size: 15px; font-weight: 600; text-align: center; outline: none; margin-bottom: 12px;
  }
  .modal-input:focus { border-color: var(--primary); }
  .modal-btn {
    background: var(--primary); color: white; border: none; width: 100%;
    padding: 12px; border-radius: 14px; font-weight: 800; font-size: 15px; cursor: pointer;
  }
  .modal-btn:hover { background: #554be6; }
  .modal-error { color: var(--secondary); font-size: 13px; font-weight: 700; margin-bottom: 12px; min-height: 18px; }

  /* Styles de l'overlay prénom */
  .prenom-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 99; padding: 20px;
  }
  .prenom-overlay.hidden { display: none !important; }
  .prenom-box { text-align: center; max-width: 400px; width: 100%; animation: pop 0.4s ease; }
  .prenom-box .owl { font-size: 70px; margin-bottom: 10px; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  .prenom-box h2 { font-family: 'Baloo 2', sans-serif; font-size: 32px; color: var(--text); margin-bottom: 6px; }
  .prenom-box p { font-weight: 600; color: var(--text-muted); margin-bottom: 24px; }
  .prenom-input {
    width: 100%; padding: 16px 20px; border-radius: 20px; border: 3px solid var(--primary-light);
