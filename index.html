<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mon Prof Virtuel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap');

  :root {
    --primary: #6C63FF;
    --primary-light: #EAE8FF;
    --secondary: #FF6B6B;
    --accent: #FFD93D;
    --green: #6BCB77;
    --bg: #F7F6FF;
    --card: #FFFFFF;
    --text: #2D2B55;
    --text-muted: #8B89A8;
    --radius: 20px;
    --shadow: 0 4px 20px rgba(108,99,255,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--primary);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 4px 16px rgba(108,99,255,0.3);
  }

  .mascot {
    width: 52px; height: 52px;
    background: white; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    animation: bounce 2s infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  .header-text h1 { font-family: 'Baloo 2', cursive; color: white; font-size: 22px; line-height: 1.1; }
  .header-text p { color: rgba(255,255,255,0.8); font-size: 13px; font-weight: 600; }

  .status-dot {
    margin-left: auto; display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.2); border-radius: 20px; padding: 6px 12px;
    color: white; font-size: 12px; font-weight: 700;
  }

  .dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.8); }
  }

  .subjects-bar {
    background: white; padding: 12px 16px;
    display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none;
    border-bottom: 2px solid var(--primary-light);
  }
  .subjects-bar::-webkit-scrollbar { display: none; }

  .subject-btn {
    flex-shrink: 0; background: var(--primary-light); border: none;
    border-radius: 30px; padding: 8px 16px;
    font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700;
    color: var(--primary); cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .subject-btn:hover, .subject-btn.active {
    background: var(--primary); color: white;
    transform: translateY(-2px); box-shadow: 0 4px 12px rgba(108,99,255,0.3);
  }

  .chat-container {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 14px; padding-bottom: 20px;
  }

  .message { display: flex
