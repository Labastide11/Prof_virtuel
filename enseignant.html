<body>
<div class="app">
  <header class="top">

<script>
(function(){
'use strict';
var QUESTION_API='https://script.google.com/macros/s/AKfycbwGcErZ0he06Dg_bpPDaHtPHa6fAcDQ-31tB7Rlr9w2JZcNaQnP9YIABJYf-CKpFfpF/exec';
var STUDENTS_API='https://script.google.com/macros/s/AKfycbxz1vYS24sv-c3XVja12geWEXIQl6bQyBoQKBx5kg_fwQaj80_Oc7Y34yeBSRN4lF1f/exec';
var state={tab:'questions',questions:[],students:[],competences:[],loading:false,error:'',filter:'todo',search:'',matiere:'',visibility:'',status:'',method:'',lastLoad:null,studentSearch:'',studentFilter:'all',studentSubject:'all',studentSort:'name',studentView:'cards',studentsLoaded:false,studentsLoading:false,studentsError:'',studentsLastLoad:null,rewardSearch:'',rewardFilter:'all',rewardSubject:'all',rewardSort:'name',rewardView:'cards',settings:null,studentOverrides:null,settingsStatus:'',settingsStatusType:''};
function $(id){return document.getElementById(id)}
function esc(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function clean(v){return String(v==null?'':v).trim()}
function norm(v){return clean(v).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}
function jsonp(url,params,timeout){timeout=timeout||25000;return new Promise(function(resolve,reject){var cb='__hibouT'+Date.now()+Math.floor(Math.random()*1e6);params=params||{};params.callback=cb;params.t=Date.now();var s=document.createElement('script');var done=false;var timer=setTimeout(function(){if(done)return;done=true;cleanup();reject(new Error('Délai dépassé'));},timeout);function cleanup(){clearTimeout(timer);try{delete window[cb]}catch(e){} if(s&&s.parentNode)s.parentNode.removeChild(s)}window[cb]=function(data){if(done)return;done=true;cleanup();resolve(data)};s.onerror=function(){if(done)return;done=true;cleanup();reject(new Error('Erreur réseau JSONP'))};s.src=url+'?'+new URLSearchParams(params).toString();document.head.appendChild(s);});}
function fmtDate(v){if(!v)return '—'; var s=String(v); if(/^\d{4}-\d{2}-\d{2}/.test(s)){var d=new Date(s); if(!isNaN(d)) return d.toLocaleDateString('fr-FR')+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});} return s}
function vis(q){return clean(q['Visibilité']||q.Visibilite||q.visibilite||q.visibility||'classe')}
function stat(q){return clean(q['Statut']||q.statut||q.status||'nouvelle')}
function mat(q){return clean(q['Matière']||q.Matiere||q.matiere||q.subject||'Boîte à questions')}
function prenom(q){return clean(q['Prénom']||q.Prenom||q.prenom||q.eleve||q.student||'')}
function qorig(q){return clean(q['Question originale']||q.questionOriginale||q.question_originale||q.question||'')}
function qcorr(q){return clean(q['Question corrigée']||q.questionCorrigee||q.question_corrigee||q.correctedQuestion||'')}
function ans(q){return clean(q['Réponse IA']||q['Reponse IA']||q.reponseIA||q.reponse_ia||q.aiAnswer||'')}
function row(q){return q.rowIndex||q.ligne||q.row||''}
function isPrivate(q){return norm(vis(q)).indexOf('prive')!==-1}
function isStar(q){return norm(vis(q)).indexOf('vedette')!==-1}
function isClass(q){return !isPrivate(q)&&!isStar(q)}
function isExplained(q){return norm(stat(q)).indexOf('expliquee')!==-1}
function isToExplain(q){return norm(stat(q)).indexOf('expliquer')!==-1}
function isNew(q){return norm(stat(q)).indexOf('nouvelle')!==-1||!stat(q)}
function counts(){var qs=state.questions;return{total:qs.length,todo:qs.filter(function(q){return !isExplained(q)}).length,classe:qs.filter(isClass).length,priv:qs.filter(isPrivate).length,star:qs.filter(isStar).length,done:qs.filter(isExplained).length}}
function filteredQuestions(){var qs=state.questions.slice().sort(function(a,b){return Number(row(b)||0)-Number(row(a)||0)}); if(state.filter==='todo')qs=qs.filter(function(q){return !isExplained(q)}); if(state.filter==='classe')qs=qs.filter(isClass); if(state.filter==='private')qs=qs.filter(isPrivate); if(state.filter==='star')qs=qs.filter(isStar); if(state.filter==='done')qs=qs.filter(isExplained); if(state.visibility)qs=qs.filter(function(q){return norm(vis(q))===norm(state.visibility)}); if(state.status)qs=qs.filter(function(q){return norm(stat(q))===norm(state.status)}); if(state.matiere)qs=qs.filter(function(q){return norm(mat(q)).indexOf(norm(state.matiere))!==-1}); if(state.search){var s=norm(state.search); qs=qs.filter(function(q){return [prenom(q),mat(q),qorig(q),qcorr(q),ans(q),vis(q),stat(q)].join(' ').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').indexOf(s)!==-1})} return qs}
function render(){ if(state.tab==='questions')renderQuestions(); else if(state.tab==='students')renderStudents(); else if(state.tab==='rewards')renderRewards(); else renderSettings(); }
function renderQuestions(){var items=filteredQuestions();$('content').innerHTML='<div class="section-title"><div><h2>📦 Questions</h2><p>Questions classées de la plus récente à la plus ancienne. Choisis une vue dans le menu de gauche.</p></div><button class="btn primary" id="loadQ">🔄 Recharger</button></div>'+viewTitleHtml()+'<div class="filters"><input id="search" placeholder="Rechercher : prénom, question, matière..." value="'+esc(state.search)+'"><input id="matiere" placeholder="Matière" value="'+esc(state.matiere)+'"><button class="btn" id="exportCsv">⬇ CSV</button></div><div class="teacher-hint"><b>Actions rapides :</b> 👥 Classe / 🔒 Privée règlent la visibilité. ⭐ Vedette met une question en avant. 🟡 À expliquer prépare une discussion. ✅ Expliquée garde la trace du travail fait.</div><div class="status-line">'+(state.loading?'Chargement en cours...':'Méthode : '+esc(state.method||'—')+' · Dernier chargement : '+esc(state.lastLoad||'—'))+'</div>'+(state.error?'<div class="error">'+esc(state.error)+'</div>':'')+(state.loading?'<div class="loading">Chargement du journal des questions...</div>':(items.length?'<div class="cards">'+items.map(cardHtml).join('')+'</div>':'<div class="empty">Aucune question dans cette vue.</div>'));$('search').oninput=function(){state.search=this.value;renderQuestions()};$('matiere').oninput=function(){state.matiere=this.value;renderQuestions()};$('loadQ').onclick=loadQuestions;$('exportCsv').onclick=exportQuestions;bindCardButtons();syncMenuActive();}
function viewTitleHtml(){var map={todo:['🟡 Questions à traiter','Toutes les questions nouvelles ou marquées à expliquer, de la plus récente à la plus ancienne.'],classe:['👥 Questions de classe','Celles que tu peux partager avec les élèves.'],private:['🔒 Questions privées','Celles qui restent uniquement visibles par toi.'],star:['⭐ Questions vedettes','Celles que tu choisis pour les mettre en avant.'],done:['✅ Questions expliquées','Questions déjà traitées en classe.'],all:['📚 Toutes les questions','Journal complet, sans filtre.']};var v=map[state.filter]||map.todo;return '<div class="view-title"><div><b>'+v[0]+'</b><br>'+v[1]+'</div></div>'}
function pillVis(q){var v=vis(q);var cls=isStar(q)?'vedette':(isPrivate(q)?'privee':'classe');return '<span class="pill '+cls+'">'+esc(v||'classe')+'</span>'}
function pillStat(q){var s=stat(q)||'nouvelle';var n=norm(s);var cls=n.indexOf('expliquer')!==-1?'aexpliquer':(n.indexOf('expliquee')!==-1?'expliquee':'nouvelle');return '<span class="pill '+cls+'">'+esc(s)+'</span>'}
function cardHtml(q){var r=row(q);return '<article class="qcard" data-row="'+esc(r)+'"><div class="qhead"><div><div class="qmeta"><span class="pill">👤 '+esc(prenom(q)||'—')+'</span><span class="pill">📚 '+esc(mat(q)||'—')+'</span>'+pillVis(q)+pillStat(q)+'<span class="pill">🕒 '+esc(fmtDate((q.Date||'' )+' '+(q.Heure||'')))+'</span></div></div><span class="pill">ligne '+esc(r)+'</span></div><div class="qtext"><div class="qbox"><strong>Question originale</strong>'+esc(qorig(q)||'—')+'</div><div class="qbox"><strong>Question corrigée</strong>'+esc(qcorr(q)||'—')+'</div></div>'+(ans(q)?'<details class="answer"><summary>Voir la réponse IA / note enseignant</summary><div>'+esc(ans(q))+'</div></details>':'')+'<div class="qactions"><div class="qactions-title">Visibilité</div><div class="qactions-group"><button class="btn small ok" data-act="vis" data-val="classe">👁 👥 Classe</button><button class="btn small private" data-act="vis" data-val="privée">👁 🔒 Privée</button><button class="btn small warn" data-act="vis" data-val="vedette">⭐ Vedette</button></div><div class="qactions-title">Statut pédagogique</div><div class="qactions-group"><button class="btn small" data-act="stat" data-val="nouvelle">Nouvelle</button><button class="btn small warn" data-act="stat" data-val="à_expliquer">🟡 À expliquer</button><button class="btn small ok" data-act="stat" data-val="expliquée">✅ Expliquée</button></div></div></article>'}
function bindCardButtons(){document.querySelectorAll('.qcard .btn[data-act]').forEach(function(b){b.onclick=function(){var art=b.closest('.qcard');var r=art&&art.dataset.row;if(!r)return;var p={action:'updateQuestion',rowIndex:r}; if(b.dataset.act==='vis')p.visibilite=b.dataset.val; if(b.dataset.act==='stat')p.statut=b.dataset.val; updateQuestion(p);};});}
function loadQuestions(){state.loading=true;state.error='';renderQuestions();var attempts=[{}, {action:'listQuestions'}, {type:'listQuestions'}];function tryOne(i){if(i>=attempts.length){state.loading=false;state.error='Impossible de charger le journal des questions.';renderQuestions();return} var params=attempts[i];jsonp(QUESTION_API,params,22000).then(function(data){var qs=data&&data.questions;if(!Array.isArray(qs)){tryOne(i+1);return} state.questions=qs;state.method=params.action?'action=listQuestions':(params.type?'type=listQuestions':'doGet par défaut');state.lastLoad=new Date().toLocaleTimeString('fr-FR');state.loading=false;state.error='';renderQuestions();}).catch(function(err){if(i<attempts.length-1)tryOne(i+1);else{state.loading=false;state.error=err.message||String(err);renderQuestions();}})}tryOne(0)}
function updateQuestion(params){var old=state.method;state.method='Mise à jour...';renderQuestions();jsonp(QUESTION_API,params,22000).then(function(data){if(!data||data.success===false)throw new Error(data&&data.error?data.error:'Mise à jour refusée');return loadQuestions();}).catch(function(err){state.method=old;state.error='Mise à jour impossible : '+(err.message||String(err));renderQuestions();});}
function exportQuestions(){var rows=[['Date','Heure','Prénom','Matière','Question originale','Question corrigée','Réponse IA','Visibilité','Statut','Ligne']].concat(state.questions.map(function(q){return[q.Date||'',q.Heure||'',prenom(q),mat(q),qorig(q),qcorr(q),ans(q),vis(q),stat(q),row(q)]}));var csv=rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"'}).join(';')}).join('\n');var blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='maitre_hibou_questions.csv';a.click();URL.revokeObjectURL(url)}
function pick(o,keys,fallback){if(!o)return fallback==null?'':fallback;for(var i=0;i<keys.length;i++){var k=keys[i];if(Object.prototype.hasOwnProperty.call(o,k)&&o[k]!=null&&String(o[k]).trim()!=='')return o[k]}return fallback==null?'':fallback}
function extractList(data,keys){if(Array.isArray(data))return data;if(data&&typeof data==='object'){for(var i=0;i<keys.length;i++){if(Array.isArray(data[keys[i]]))return data[keys[i]]}if(Array.isArray(data.data))return data.data}return[]}
function studentName(s){return clean(pick(s,['prenom','Prénom','Prenom','élève','eleve','student','name','Nom'],'Élève'))}
function studentInitial(s){return clean(pick(s,['initiale','Initiale','initial','Initial'],studentName(s).charAt(0)))}
function studentBirth(s){return clean(pick(s,['naissance','Naissance','dateNaissance','Date de naissance','anniversaire'],'—'))}
function studentSex(s){return clean(pick(s,['sexe','Sexe','genre','Genre'],'—'))}
function studentActive(s){var raw=norm(pick(s,['actif','Actif','active','Active'],'oui'));return raw===''||['oui','yes','true','1','actif','active','x'].indexOf(raw)!==-1}
function compStudent(c){return clean(pick(c,['prenom','Prénom','Prenom','eleve','Élève','student','name'],'')).trim()}
function compSubject(c){return clean(pick(c,['matiere','Matière','Matiere','discipline','Domaine','domaine','subject'],'Autre'))}
function compLabel(c){return clean(pick(c,['competence','Compétence','Competence','ceinture','Ceinture','objectif','Objectif','titre','Titre'],'Compétence validée'))}
function compLevel(c){return clean(pick(c,['niveau','Niveau','medaille','Médaille','Medaille','couleur','Couleur','resultat','Résultat','Resultat'],'')).trim()}
function compDate(c){return clean(pick(c,['date','Date','horodatage','Horodatage','timestamp','Timestamp','dateValidation','Date validation'],'')).trim()}
function dateStamp(v){var s=clean(v);if(!s)return 0;var d=new Date(s);if(!isNaN(d.getTime()))return d.getTime();var m=s.match(/(\d{1,2})[\/.-](\d{1,2})[\/.-](\d{2,4})(?:\D+(\d{1,2})[:h](\d{2}))?/);if(m){var y=Number(m[3]);if(y<100)y+=2000;return new Date(y,Number(m[2])-1,Number(m[1]),Number(m[4]||0),Number(m[5]||0)).getTime()}return 0}
function formatActivityDate(v){var s=clean(v);if(!s)return 'date non renseignée';var d=new Date(s);if(!isNaN(d.getTime()))return d.toLocaleDateString('fr-FR');return s}
var SETTINGS_KEY='maitre_hibou_reglages_v25618';
var STUDENT_OVERRIDES_KEY='maitre_hibou_eleves_locaux_v25618';
function defaultSettings(){return{className:'CE2 – École des Troubadours',schoolYear:'2025–2026',questionVisibility:'classe',questionStatus:'nouvelle',curiosityPoints:1,trainingQuestions:10,beltQuestions:20,protectionEnabled:true,longPressEnabled:true}}
function loadSettings(){if(state.settings)return state.settings;var base=defaultSettings();try{var saved=JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}')||{};Object.keys(saved).forEach(function(k){base[k]=saved[k]})}catch(e){}state.settings=base;return base}
function loadStudentOverrides(){if(state.studentOverrides)return state.studentOverrides;try{state.studentOverrides=JSON.parse(localStorage.getItem(STUDENT_OVERRIDES_KEY)||'{}')||{}}catch(e){state.studentOverrides={}}return state.studentOverrides}
function saveStudentOverrides(){try{localStorage.setItem(STUDENT_OVERRIDES_KEY,JSON.stringify(loadStudentOverrides()))}catch(e){}}
function studentSourceName(s){return clean(pick(s,['_sourceName','sourceName','ancienPrenom','Ancien prénom'],studentName(s)))}
function studentRecordKey(s){return clean(pick(s,['_recordKey','recordKey'],'sheet:'+norm(studentSourceName(s)||studentName(s))))}
function effectiveStudents(){var overrides=loadStudentOverrides(),used={};var list=state.students.map(function(s){var source=studentName(s);var key='sheet:'+norm(source);used[key]=true;var copy=Object.assign({},s,{_recordKey:key,_sourceName:source});if(overrides[key])copy=Object.assign(copy,overrides[key],{_recordKey:key,_sourceName:source});return copy});Object.keys(overrides).forEach(function(key){if(!used[key]&&key.indexOf('local:')===0){var item=Object.assign({},overrides[key],{_recordKey:key,_sourceName:overrides[key]._sourceName||overrides[key].prenom||''});list.push(item)}});return list}
function studentRows(){var compMap={};var qMap={};state.competences.forEach(function(c){var k=norm(compStudent(c));if(!k)return;(compMap[k]||(compMap[k]=[])).push(c)});state.questions.forEach(function(q){var k=norm(prenom(q));if(!k)return;(qMap[k]||(qMap[k]=[])).push(q)});return effectiveStudents().map(function(s){var name=studentName(s);var key=norm(studentSourceName(s)||name);var comps=(compMap[key]||[]).slice();var questions=(qMap[key]||[]).slice();comps.sort(function(a,b){return dateStamp(compDate(b))-dateStamp(compDate(a))});questions.sort(function(a,b){return Number(row(b)||0)-Number(row(a)||0)});var subjects={};comps.forEach(function(c){var sub=compSubject(c)||'Autre';subjects[sub]=(subjects[sub]||0)+1});var subjectNames=Object.keys(subjects).sort(function(a,b){return a.localeCompare(b,'fr',{sensitivity:'base'})});var pending=questions.filter(function(q){return !isExplained(q)}).length;return{raw:s,name:name,key:key,initial:studentInitial(s),birth:studentBirth(s),sex:studentSex(s),active:studentActive(s),comps:comps,questions:questions,pending:pending,subjects:subjects,subjectNames:subjectNames,latest:comps[0]||null}})}
function availableStudentSubjects(rows){var map={};rows.forEach(function(r){r.subjectNames.forEach(function(s){map[s]=true})});return Object.keys(map).sort(function(a,b){return a.localeCompare(b,'fr',{sensitivity:'base'})})}
function filteredStudentRows(){var rows=studentRows();var s=norm(state.studentSearch);if(s)rows=rows.filter(function(r){var hay=[r.name,r.initial,r.birth,r.sex].concat(r.subjectNames).concat(r.comps.map(compLabel)).join(' ');return norm(hay).indexOf(s)!==-1});if(state.studentFilter==='with')rows=rows.filter(function(r){return r.comps.length>0});if(state.studentFilter==='without')rows=rows.filter(function(r){return r.comps.length===0});if(state.studentFilter==='questions')rows=rows.filter(function(r){return r.questions.length>0});if(state.studentFilter==='pending')rows=rows.filter(function(r){return r.pending>0});if(state.studentFilter==='inactive')rows=rows.filter(function(r){return !r.active});if(state.studentSubject!=='all')rows=rows.filter(function(r){return r.subjectNames.some(function(sub){return norm(sub)===norm(state.studentSubject)})});rows.sort(function(a,b){if(state.studentSort==='validations')return b.comps.length-a.comps.length||a.name.localeCompare(b.name,'fr',{sensitivity:'base'});if(state.studentSort==='questions')return b.questions.length-a.questions.length||a.name.localeCompare(b.name,'fr',{sensitivity:'base'});if(state.studentSort==='recent')return dateStamp(compDate(b.latest||{}))-dateStamp(compDate(a.latest||{}))||a.name.localeCompare(b.name,'fr',{sensitivity:'base'});return a.name.localeCompare(b.name,'fr',{sensitivity:'base'})});return rows}
function subjectChipsHtml(r){if(!r.subjectNames.length)return '<span class="student-empty-data">Aucune matière validée pour le moment.</span>';return '<div class="subject-chips">'+r.subjectNames.map(function(s){return '<span class="subject-chip">'+esc(s)+' <b>'+r.subjects[s]+'</b></span>'}).join('')+'</div>'}

function refreshDataForExport(kind){settingsStatus('Chargement des données avant export…','');if(kind==='questions')return fetchQuestionsSilent().then(function(qs){state.questions=qs;return true});if(kind==='list')return jsonp(STUDENTS_API,{},22000).then(function(data){state.students=extractList(data,['students','eleves','élèves','liste']);state.studentsLoaded=true;return true});return Promise.all([jsonp(STUDENTS_API,{},22000),jsonp(STUDENTS_API,{action:'competences'},22000),fetchQuestionsSilent().catch(function(){return state.questions||[]})]).then(function(res){state.students=extractList(res[0],['students','eleves','élèves','liste']);state.competences=extractList(res[1],['competences','compétences','validations','reussites','réussites']);if(Array.isArray(res[2]))state.questions=res[2];state.studentsLoaded=true;return true})}
function exportStudentListAll(){var rows=effectiveStudents().slice().sort(function(a,b){return studentName(a).localeCompare(studentName(b),'fr',{sensitivity:'base'})});csvDownload('maitre_hibou_liste_eleves.csv',[['Prénom','Initiale','Date de naissance','Sexe','Actif','Source']].concat(rows.map(function(s){return[studentName(s),studentInitial(s),studentBirth(s),studentSex(s),studentActive(s)?'Oui':'Non',studentRecordKey(s).indexOf('local:')===0?'Modification locale':'Google Sheet']})))}
function exportStudentTrackingAll(){var rows=studentRows().slice().sort(function(a,b){return a.name.localeCompare(b.name,'fr',{sensitivity:'base'})});csvDownload('maitre_hibou_suivi_eleves_complet.csv',[['Prénom','Actif','Naissance','Sexe','Validations','Matières','Questions','Questions à traiter','Dernière compétence','Dernière matière','Dernière date']].concat(rows.map(function(r){return[r.name,r.active?'Oui':'Non',r.birth,r.sex,r.comps.length,r.subjectNames.join(', '),r.questions.length,r.pending,r.latest?compLabel(r.latest):'',r.latest?compSubject(r.latest):'',r.latest?compDate(r.latest):'']})))}
function exportRewardsAll(){var rows=rewardRows().slice().sort(function(a,b){return a.name.localeCompare(b.name,'fr',{sensitivity:'base'})});csvDownload('maitre_hibou_recompenses_completes.csv',[['Prénom','Or','Argent','Bronze','Sans médaille','Ceintures validées','Matières','Dernière compétence','Dernière matière','Dernière date']].concat(rows.map(function(r){return[r.name,r.medals.gold,r.medals.silver,r.medals.bronze,r.medals.none,r.total,r.subjectNames.join(', '),r.latest?compLabel(r.latest):'',r.latest?compSubject(r.latest):'',r.latest?compDate(r.latest):'']})))}
function exportQuestionsAll(){var rows=state.questions.slice().sort(function(a,b){return Number(row(b)||0)-Number(row(a)||0)});csvDownload('maitre_hibou_journal_questions_complet.csv',[['Date','Heure','Prénom','Matière','Question originale','Question corrigée','Réponse IA','Visibilité','Statut','Ligne']].concat(rows.map(function(q){return[q.Date||'',q.Heure||'',prenom(q),mat(q),qorig(q),qcorr(q),ans(q),vis(q),stat(q),row(q)]})))}
function runSettingsExport(kind){var fn=kind==='list'?exportStudentListAll:(kind==='tracking'?exportStudentTrackingAll:(kind==='rewards'?exportRewardsAll:exportQuestionsAll));refreshDataForExport(kind).then(function(){fn();settingsStatus('Export créé.','ok');if(state.tab==='settings')renderSettings()}).catch(function(err){settingsStatus('Export impossible : '+(err.message||String(err)),'bad')})}
function rosterManagerHtml(){if(state.studentsLoading)return '<div class="loading">Chargement de la liste des élèves…</div>';if(state.studentsError)return '<div class="error">'+esc(state.studentsError)+'</div><div class="roster-tools"><button class="btn primary" id="loadSettingsStudents">🔄 Réessayer</button></div>';if(!state.studentsLoaded)return '<div class="note">Charge la liste pour ajouter, corriger ou désactiver un élève.</div><div class="roster-tools"><button class="btn primary" id="loadSettingsStudents">🔄 Charger la liste</button></div>';var rows=effectiveStudents().slice().sort(function(a,b){return studentName(a).localeCompare(studentName(b),'fr',{sensitivity:'base'})});return '<div class="roster-note"><b>Important :</b> les modifications réalisées ici sont conservées sur cet appareil et utilisées dans les cartes, les tableaux et les exports. Le Google Sheet reste la source de connexion des élèves tant que son script n’accepte pas encore l’écriture.</div><div class="roster-tools"><button class="btn primary" id="addStudentBtn">➕ Ajouter un élève</button><button class="btn" id="resetStudentOverrides">↩ Effacer les modifications locales</button></div><div class="table-wrap"><table class="roster-table"><thead><tr><th>Prénom</th><th>Naissance</th><th>Sexe</th><th>État</th><th>Actions</th></tr></thead><tbody>'+rows.map(function(s){var key=studentRecordKey(s),local=key.indexOf('local:')===0;return '<tr><td><strong>'+esc(studentName(s))+'</strong>'+(local?'<span class="local-mark">local</span>':'')+'<br><span class="student-empty-data">'+esc(studentInitial(s))+'</span></td><td>'+esc(studentBirth(s))+'</td><td>'+esc(studentSex(s))+'</td><td><span class="pill '+(studentActive(s)?'classe':'privee')+'">'+(studentActive(s)?'Actif':'Inactif')+'</span></td><td><button class="btn small" data-edit-student="'+esc(key)+'">✏️ Modifier</button> <button class="btn small '+(studentActive(s)?'private':'ok')+'" data-toggle-student="'+esc(key)+'">'+(studentActive(s)?'⏸ Désactiver':'▶ Activer')+'</button></td></tr>'}).join('')+'</tbody></table></div>'}
function findEffectiveStudent(key){return effectiveStudents().find(function(s){return studentRecordKey(s)===key})||null}
function closeStudentEditor(){var o=$('studentEditorOverlay');if(o)o.remove()}
function openStudentEditor(key){var current=key?findEffectiveStudent(key):null;var recordKey=current?studentRecordKey(current):('local:'+Date.now()+'_'+Math.floor(Math.random()*10000));var box=document.createElement('div');box.id='studentEditorOverlay';box.className='editor-overlay';box.innerHTML='<div class="editor-box" role="dialog" aria-modal="true"><div class="editor-head"><div><h3>'+(current?'Modifier l’élève':'Ajouter un élève')+'</h3><p>'+(current?'Corrige les informations nécessaires.':'Renseigne les informations principales.')+'</p></div><button class="editor-close" id="closeStudentEditor" aria-label="Fermer">×</button></div><div class="settings-form-grid"><div class="settings-field"><label for="editStudentName">Prénom</label><input id="editStudentName" value="'+esc(current?studentName(current):'')+'" autocomplete="off"></div><div class="settings-field"><label for="editStudentInitial">Initiale</label><input id="editStudentInitial" maxlength="3" value="'+esc(current?studentInitial(current):'')+'"></div><div class="settings-field"><label for="editStudentBirth">Date de naissance</label><input id="editStudentBirth" value="'+esc(current?studentBirth(current):'')+'" placeholder="JJ/MM/AAAA"><small>Utilisée pour les anniversaires.</small></div><div class="settings-field"><label for="editStudentSex">Sexe / genre</label><input id="editStudentSex" value="'+esc(current?studentSex(current):'')+'" placeholder="F, M ou autre"></div><div class="settings-field full"><label>Statut</label><div class="toggle-row"><div class="toggle-copy"><b>Élève actif</b><small>Un élève inactif reste dans l’historique mais peut être masqué du suivi courant.</small></div><label class="switch"><input id="editStudentActive" type="checkbox" '+(!current||studentActive(current)?'checked':'')+'><span class="switch-slider"></span></label></div></div></div><div id="studentEditorError" class="settings-status bad"></div><div class="editor-actions"><button class="btn" id="cancelStudentEditor">Annuler</button><button class="btn primary" id="saveStudentEditor">💾 Enregistrer</button></div></div>';document.body.appendChild(box);$('closeStudentEditor').onclick=closeStudentEditor;$('cancelStudentEditor').onclick=closeStudentEditor;box.addEventListener('click',function(ev){if(ev.target===box)closeStudentEditor()});$('saveStudentEditor').onclick=function(){var name=clean($('editStudentName').value);if(!name){$('studentEditorError').textContent='Le prénom est obligatoire.';return}var initial=clean($('editStudentInitial').value)||name.charAt(0).toUpperCase();var overrides=loadStudentOverrides();var originalSource=current?studentSourceName(current):name;overrides[recordKey]={_recordKey:recordKey,_sourceName:originalSource,prenom:name,initiale:initial,naissance:clean($('editStudentBirth').value)||'—',sexe:clean($('editStudentSex').value)||'—',actif:$('editStudentActive').checked?'Oui':'Non',_localOnly:recordKey.indexOf('local:')===0};saveStudentOverrides();closeStudentEditor();settingsStatus('Modification enregistrée sur cet appareil.','ok');renderSettings()}}
function toggleLocalStudent(key){var current=findEffectiveStudent(key);if(!current)return;var overrides=loadStudentOverrides();overrides[key]={_recordKey:key,_sourceName:studentSourceName(current),prenom:studentName(current),initiale:studentInitial(current),naissance:studentBirth(current),sexe:studentSex(current),actif:studentActive(current)?'Non':'Oui',_localOnly:key.indexOf('local:')===0};saveStudentOverrides();settingsStatus('Statut de '+studentName(current)+' mis à jour.','ok');renderSettings()}
function bindSettingsActions(){var save=$('saveSettingsBtn');if(save)save.onclick=persistSettingsFromForm;var load=$('loadSettingsStudents');if(load)load.onclick=loadStudents;var add=$('addStudentBtn');if(add)add.onclick=function(){openStudentEditor('')};var reset=$('resetStudentOverrides');if(reset)reset.onclick=function(){if(confirm('Effacer toutes les modifications locales apportées à la liste des élèves ?')){state.studentOverrides={};saveStudentOverrides();settingsStatus('Modifications locales effacées.','ok');renderSettings()}};document.querySelectorAll('[data-edit-student]').forEach(function(b){b.onclick=function(){openStudentEditor(b.dataset.editStudent)}});document.querySelectorAll('[data-toggle-student]').forEach(function(b){b.onclick=function(){toggleLocalStudent(b.dataset.toggleStudent)}});document.querySelectorAll('[data-settings-export]').forEach(function(b){b.onclick=function(){runSettingsExport(b.dataset.settingsExport)}})}
function renderSettings(){var s=loadSettings();$('content').innerHTML='<div class="section-title"><div><h2>⚙️ Réglages</h2><p>Classe, règles pédagogiques, accès enseignant et exports complets.</p></div><span class="settings-version">Maître Hibou V25.6.18</span></div><div class="settings-stack"><section class="settings-card"><div class="settings-card-head"><div class="settings-card-title"><div class="settings-card-icon">🏫</div><div><h3>1. Classe</h3><p>Informations générales et gestion de la liste des élèves.</p></div></div></div><div class="settings-form-grid"><div class="settings-field"><label for="settingClassName">Nom de la classe</label><input id="settingClassName" value="'+esc(s.className)+'"></div><div class="settings-field"><label for="settingSchoolYear">Année scolaire</label><input id="settingSchoolYear" value="'+esc(s.schoolYear)+'" placeholder="2025–2026"></div></div><details class="student-detail" open><summary>Gérer les élèves</summary><div style="margin-top:10px">'+rosterManagerHtml()+'</div></details></section><section class="settings-card"><div class="settings-card-head"><div class="settings-card-title"><div class="settings-card-icon">🎯</div><div><h3>2. Règles pédagogiques</h3><p>Valeurs recommandées pour les questions, la curiosité et les ceintures.</p></div></div></div><div class="settings-form-grid"><div class="settings-field"><label for="settingQuestionVisibility">Visibilité par défaut des questions</label><select id="settingQuestionVisibility"><option value="classe">Classe</option><option value="privée">Privée</option></select></div><div class="settings-field"><label for="settingQuestionStatus">Statut par défaut</label><select id="settingQuestionStatus"><option value="nouvelle">Nouvelle</option><option value="à_expliquer">À expliquer</option></select></div><div class="settings-field"><label for="settingCuriosityPoints">Points de curiosité accordés</label><input id="settingCuriosityPoints" type="number" min="0" max="100" value="'+esc(s.curiosityPoints)+'"></div><div class="settings-field"><label for="settingTrainingQuestions">Questions par entraînement</label><input id="settingTrainingQuestions" type="number" min="1" max="100" value="'+esc(s.trainingQuestions)+'"></div><div class="settings-field"><label for="settingBeltQuestions">Questions par passage de ceinture</label><input id="settingBeltQuestions" type="number" min="1" max="100" value="'+esc(s.beltQuestions)+'"></div></div></section><section class="settings-card"><div class="settings-card-head"><div class="settings-card-title"><div class="settings-card-icon">🔐</div><div><h3>3. Accès enseignant</h3><p>L’accès caché par appui long reste toujours conservé.</p></div></div></div><div class="toggle-row"><div class="toggle-copy"><b>Protection de l’espace enseignant</b><small>Active ou désactive temporairement la demande du code enseignant.</small></div><label class="switch"><input id="settingProtection" type="checkbox" '+(s.protectionEnabled?'checked':'')+'><span class="switch-slider"></span></label></div><div class="toggle-row"><div class="toggle-copy"><b>Accès par appui long sur le hibou</b><small>Ce raccourci reste obligatoire pour ne pas afficher un bouton enseignant aux élèves.</small></div><label class="switch"><input type="checkbox" checked disabled><span class="switch-slider"></span></label></div><div class="teacher-hint"><b>Compatibilité :</b> la préférence est enregistrée sous <code>hibou_teacher_protection_enabled</code>. L’index élève devra lire cette valeur pour que l’activation ou la désactivation agisse dès l’appui long.</div></section><section class="settings-card"><div class="settings-card-head"><div class="settings-card-title"><div class="settings-card-icon">📤</div><div><h3>4. Exports de la classe</h3><p>Exports CSV complets, indépendants des filtres visibles dans les autres onglets.</p></div></div></div><div class="export-grid"><div class="export-card"><div class="export-copy"><b>👥 Liste des élèves</b><small>Prénom, initiale, naissance, sexe et statut actif.</small></div><button class="btn small" data-settings-export="list">⬇ Exporter la liste</button></div><div class="export-card"><div class="export-copy"><b>📊 Suivi des élèves</b><small>Validations, matières, questions et dernière réussite.</small></div><button class="btn small" data-settings-export="tracking">⬇ Exporter le suivi</button></div><div class="export-card"><div class="export-copy"><b>🏆 Récompenses</b><small>Médailles, ceintures, matières et dernière récompense.</small></div><button class="btn small" data-settings-export="rewards">⬇ Exporter les récompenses</button></div><div class="export-card"><div class="export-copy"><b>📦 Journal des questions</b><small>Questions originales et corrigées, réponse IA, visibilité et statut.</small></div><button class="btn small" data-settings-export="questions">⬇ Exporter le journal</button></div></div></section></div><div class="settings-savebar"><span id="settingsStatus" class="settings-status '+esc(state.settingsStatusType)+'">'+esc(state.settingsStatus||'Les réglages sont enregistrés dans ce navigateur.')+'</span><button class="btn primary" id="saveSettingsBtn">💾 Enregistrer les réglages</button></div>';$('settingQuestionVisibility').value=s.questionVisibility;$('settingQuestionStatus').value=s.questionStatus;bindSettingsActions();syncMenuActive()}
function syncMenuActive(){document.querySelectorAll('.tab').forEach(function(b){var active=false;if(b.classList.contains('qview'))active=state.tab==='questions'&&b.dataset.view===state.filter;else active=b.dataset.tab===state.tab;b.classList.toggle('active',active);});}
function switchTab(t){state.tab=t;syncMenuActive();render();if(t==='questions'&&!state.questions.length)loadQuestions();if((t==='students'||t==='rewards'||t==='settings')&&!state.studentsLoaded&&!state.studentsLoading)loadStudents();}
function switchQuestionView(view){state.tab='questions';state.filter=view||'todo';syncMenuActive();renderQuestions();if(!state.questions.length)loadQuestions();}
document.querySelectorAll('.main-tab').forEach(function(b){b.onclick=function(){switchTab(b.dataset.tab)}});
document.querySelectorAll('.qview').forEach(function(b){b.onclick=function(){switchQuestionView(b.dataset.view)}});
$('reloadBtn').onclick=function(){ if(state.tab==='questions')loadQuestions(); else if(state.tab==='students'||state.tab==='rewards'||state.tab==='settings')loadStudents(); else render(); };
syncMenuActive();render();loadQuestions();
})();
</script>
</body>
</html>
