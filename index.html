<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mon Prof Virtuel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght=400;600;700;800;900&family=Baloo+2:wght=700;800&display=swap');

  :root {
    --primary: #6C63FF;
    --primary-light: #EAE8FF;
    --secondary: #FF6B6B;
    --accent: #FFD93D;
    --green: #6BCB77;
    --bg: #F7F6FF;
    --card: #FFFFFF;
    --text: #2D2B55;
    --text-muted: #8B89A8;
    --radius: 20px;
    --shadow: 0 4px 20px rgba(108,99,255,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  header {
    background: var(--card);
    padding: 12px 16px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo-area { display: flex; align-items: center; gap: 8px; }
  .logo-icon { font-size: 28px; }
  .logo-text { font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 20px; color: var(--primary); line-height: 1; }

  .header-actions { display: flex; align-items: center; gap: 10px; }

  .badge {
    background: var(--primary-light);
    color: var(--primary);
    padding: 6px 12px;
    border-radius: 50px;
    font-weight: 800;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    box-shadow: inset 0 2px 4px rgba(108,99,255,0.06);
  }
  .badge.score { background: #FFF9E6; color: #D4A300; }
  
  @keyframes bump {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  .badge.score.bump { animation: bump 0.3s ease-out; }

  .btn-round {
    background: var(--card);
    border: 2px solid var(--primary-light);
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-round:hover { background: var(--primary-light); border-color: var(--primary); }
  .btn-round.muted { color: var(--text-muted); border-color: #ECEBF3; background: #F4F3F8; }

  /* Sélecteur de Matières */
  .subjects-bar {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    overflow-x: auto;
    white-space: nowrap;
    scrollbar-width: none;
  }
  .subjects-bar::-webkit-scrollbar { display: none; }
  
  .subject-btn {
    background: var(--card);
    border: 2px solid transparent;
    padding: 8px 14px;
    border-radius: 50px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .subject-btn.active { background: var(--primary); color: white; }
  .subject-btn:not(.active):hover { transform: translateY(-2px); border-color: var(--primary-light); }

  /* CADRE DU QUIZ D'ACCUEIL */
  .welcome-quiz-container {
    max-width: 768px;
    width: calc(100% - 32px);
    margin: 10px auto 5px auto;
    background: linear-gradient(135deg, #FFFAEB 0%, #FFF5D1 100%);
    border: 3px solid var(--accent);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
    display: none;
    animation: fadeIn 0.4s ease-out;
  }
  .wq-title-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 2px dashed rgba(255,107,107,0.2); padding-bottom: 6px; }
  .wq-label { font-family: 'Baloo 2', sans-serif; font-weight: 800; color: #7A5C00; font-size: 16px; }
  .wq-subject { font-size: 12px; font-weight: 800; background: var(--primary); color: white; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; }
  .wq-question { font-weight: 800; font-size: 15px; margin-bottom: 12px; color: var(--text); }
  .wq-options { display: flex; flex-direction: column; gap: 8px; }
  .wq-option {
    background: var(--card); border: 2px solid #ECEBF3; padding: 10px 14px; border-radius: 12px;
    font-family: inherit; font-weight: 700; font-size: 14px; text-align: left; cursor: pointer; color: var(--text); transition: all 0.2s;
  }
  .wq-option:not(:disabled):hover { border-color: var(--primary); background: var(--primary-light); }
  .wq-option.correct { background: #E6F7E9 !important; border-color: var(--green) !important; color: #1E5627 !important; font-weight: 800; }
  .wq-option.wrong { background: #FFEAEA !important; border-color: var(--secondary) !important; color: #7A2222 !important; }
  .wq-loading { font-weight: 700; font-size: 14px; color: var(--text-muted); text-align: center; padding: 10px 0; }
  .wq-result { font-weight: 800; font-size: 14px; text-align: center; margin-top: 12px; }

  /* Zone de Chat */
  .chat-container {
    flex: 1;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
    max-width: 768px;
    width: 100%;
    margin: 0 auto;
  }

  .message { display: flex; gap: 12px; max-width: 85%; animation: fadeIn 0.3s ease-out forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .message.prof { align-self: flex-start; }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: var(--shadow);
    flex-shrink: 0;
  }
  .avatar.prof { background: #EAE8FF; }
  .avatar.user { background: #FFD93D; }

  .bubble {
    background: var(--card);
    padding: 12px 16px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    font-size: 15px;
    line-height: 1.5;
    font-weight: 600;
  }
  .message.prof .bubble { border-top-left-radius: 4px; }
  .message.user .bubble { border-top-right-radius: 4px; background: var(--primary); color: white; }

  /* Questions rapides */
  .quick-questions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 16px 12px 16px;
    max-width: 768px;
    width: 100%;
    margin: 0 auto;
  }
  .quick-btn {
    background: #EAE8FF; border: none; color: var(--primary); padding: 8px 14px;
    border-radius: 14px; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.2s;
  }
  .quick-btn:hover { background: var(--primary); color: white; transform: scale(1.02); }

  /* Barre d'écriture fixe en bas */
  .input-area {
    background: var(--card); padding: 12px 16px; box-shadow: 0 -4px 20px rgba(0,0,0,0.04);
    position: sticky; bottom: 0; z-index: 10;
  }
  .input-wrapper {
    max-width: 768px; margin: 0 auto; display: flex; align-items: center; gap: 8px;
    background: #F4F3F8; padding: 6px 10px; border-radius: 30px; border: 2px solid transparent; transition: all 0.2s;
  }
  .input-wrapper:focus-within { background: var(--card); border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-light); }

  .chat-input {
    flex: 1; background: none; border: none; outline: none; font-family: inherit;
    font-size: 15px; font-weight: 600; color: var(--text); padding: 6px 4px; resize: none; max-height: 100px;
  }

  .action-btn {
    background: var(--primary); color: white; border: none; width: 36px; height: 36px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer;
  }
  .action-btn.voice { background: var(--secondary); }
  .action-btn.voice.recording { animation: pulse 1.2s infinite; background: #ff3b3b; }

  .speech-status {
    position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
    background: var(--secondary); color: white; padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 700;
  }

  .typing-indicator { display: flex; gap: 4px; align-items: center; height: 20px; }
  .typing-indicator span { width: 8px; height: 8px; background: var(--text-muted); border-radius: 50%; opacity: 0.4; animation: wave 1.2s infinite; }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes wave { 0%, 100% { transform: translateY(0); opacity: 0.4; } 50% { transform: translateY(-6px); opacity: 1; } }

  /* Modals */
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(45,43,85,0.6);
    backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px;
  }
  .modal-overlay.hidden { display: none !important; }
  .modal-box {
    background: var(--card); padding: 30px; border-radius: 24px; max-width: 440px; width: 100%; text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15); animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  
  .modal-box h2 { font-family: 'Baloo 2', sans-serif; font-size: 24px; color: var(--primary); margin-bottom: 8px; }
  .modal-box p { font-weight: 600; font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
  .modal-input {
    width: 100%; padding: 12px 16px; border-radius: 14px; border: 2px solid var(--primary-light);
    font-family: inherit; font-size: 15px; font-weight: 600; text-align: center; outline: none; margin-bottom: 12px;
  }
  .modal-btn { background: var(--primary); color: white; border: none; width: 100%; padding: 12px; border-radius: 14px; font-weight: 800; font-size: 15px; cursor: pointer; }
  .modal-error { color: var(--secondary); font-size: 13px; font-weight: 700; margin-bottom: 12px; min-height: 18px; }

  /* Prénom Overlay */
  .prenom-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 99; padding: 20px;
  }
  .prenom-overlay.hidden { display: none !important; }
  .prenom-box { text-align: center; max-width: 400px; width: 100%; }
  .prenom-box .owl { font-size: 70px; margin-bottom: 10px; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  .prenom-box h2 { font-family: 'Baloo 2', sans-serif; font-size: 32px; color: var(--text); margin-bottom: 6px; }
  .prenom-box p { font-weight: 600; color: var(--text-muted); margin-bottom: 24px; }
  .prenom-input {
    width: 100%; padding: 16px 20px; border-radius: 20px; border: 3px solid var(--primary-light);
    font-family: inherit; font-size: 18px; font-weight: 700; text-align: center; outline: none; margin-bottom: 14px; box-shadow: var(--shadow);
  }
  .prenom-btn { background: var(--primary); color: white; border: none; width: 100%; padding: 14px; border-radius: 20px; font-weight: 800; font-size: 16px; cursor: pointer; box-shadow: 0 6px 16px rgba(108,99,255,0.3); }

  /* Quiz standards dans les bulles */
  .quiz-container { background: #F8F7FF; border: 2px dashed var(--primary-light); border-radius: 16px; padding: 16px; margin-top: 10px; width: 100%; }
  .quiz-progress { font-size: 12px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 6px; }
  .quiz-question { font-weight: 800; font-size: 15px; margin-bottom: 12px; color: var(--text); }
  .quiz-options { display: flex; flex-direction: column; gap: 8px; }
  .quiz-option {
    background: var(--card); border: 2px solid #ECEBF3; padding: 10px 14px; border-radius: 12px;
    font-family: inherit; font-weight: 700; font-size: 14px; text-align: left; cursor: pointer; color: var(--text); transition: all 0.2s;
  }
  .quiz-option.correct { background: #E6F7E9 !important; border-color: var(--green) !important; color: #1E5627 !important; font-weight: 800; }
  .quiz-option.wrong { background: #FFEAEA !important; border-color: var(--secondary) !important; color: #7A2222 !important; }
  
  .quiz-trigger-btn {
    background: var(--accent); color: #7A5C00; border: none; padding: 8px 14px; border-radius: 12px;
    font-weight: 800; font-size: 13px; margin-top: 8px; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; box-shadow: 0 4px 10px rgba(255,217,61,0.3);
  }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <div class="logo-icon">🦉</div>
    <div class="logo-text">Maitre<br>Hibou</div>
  </div>
  <div class="header-actions">
    <div class="badge" id="eleveBadge" style="display:none; cursor:pointer; background:#ECEBF3; color:var(--text);" onclick="changerEleve()" title="Changer d'élève">
      👤 <span id="eleveNom">Élève</span>
    </div>
    <div class="badge score" id="scoreBadge">🎯 <span id="scoreVal">0</span> pts</div>
    <button class="btn-round" id="soundBtn" onclick="toggleSound()">🔊</button>
  </div>
</header>

<div class="subjects-bar">
  <button class="subject-btn active" onclick="selectSubject(this, 'général')">🏠 Général</button>
  <button class="subject-btn" onclick="selectSubject(this, 'maths')">🔢 Maths</button>
  <button class="subject-btn" onclick="selectSubject(this, 'français')">✍️ Français</button>
  <button class="subject-btn" onclick="selectSubject(this, 'sciences')">💡 Sciences</button>
  <button class="subject-btn" onclick="selectSubject(this, 'histoire')">🏰 Histoire</button>
  <button class="subject-btn" onclick="selectSubject(this, 'géographie')">🌍 Géo</button>
  <button class="subject-btn" onclick="selectSubject(this, 'anglais')">🇬🇧 Anglais</button>
</div>

<div class="welcome-quiz-container" id="welcomeQuizFrame"></div>

<div class="chat-container" id="chatContainer">
  <div class="message prof">
    <div class="avatar prof">🦉</div>
    <div class="bubble">Coucou ! Je suis Maître Hibou, ton instituteur virtuel. Choisis une matière en haut ou pose-moi directement ta question !</div>
  </div>
</div>

<div class="quick-questions" id="quickQuestions">
  <button class="quick-btn" onclick="sendQuick('Explique-moi les tables de multiplication')">💡 Les multiplications</button>
  <button class="quick-btn" onclick="sendQuick('C\'est quoi un nom commun ?')">🎯 Le nom commun</button>
  <button class="quick-btn" onclick="sendQuick('Comment fonctionne le système solaire ?')">✨ Le système solaire</button>
  <button class="quick-btn" onclick="sendQuick('Comment dire les couleurs en anglais ?')">🇬🇧 Couleurs en anglais</button>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea class="chat-input" id="userInput" rows="1" placeholder="Écris ton message ici..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <div style="position:relative; display:flex; gap:6px;">
      <div class="speech-status" id="speechStatus" style="display:none;"></div>
      <button class="action-btn voice" id="voiceBtn" onclick="toggleVoice()">🎤</button>
      <button class="action-btn" onclick="sendMessage()">🚀</button>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal-box">
    <h2>Clé de sécurité requise 🔑</h2>
    <p>Pour me permettre de réfléchir et de te répondre, entre ta clé d'activation API Groq ci-dessous :</p>
    <input class="modal-input" type="password" id="apiKeyInput" placeholder="gsk_..." autocomplete="off">
    <div class="modal-error" id="modalError"></div>
    <button class="modal-btn" onclick="saveApiKey()">Valider et activer 🚀</button>
  </div>
</div>

<script>
let GROQ_KEY = '';
let currentSubject = 'général';
let score = 0;
let isRecording = false;
let recognition = null;
let conversationHistory = [];
let soundEnabled = true;
let prenomActuel = '';

// METTEZ VOTRE LIEN DE SCRIPT GOOGLE ICI (Si l'URL renvoie un 404, le code l'ignorera proprement)
const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/AKfycbzeHY0Vm-O923mZfgQjmvUdtJUIEVUVR99srqocBldvkl7JPWn49K7tqqEthQB4JDQm/exec';

window.addEventListener('load', () => {
  document.getElementById('modalOverlay').classList.add('hidden');
  
  if (!document.getElementById('prenomOverlay')) {
    const prenomDiv = document.createElement('div');
    prenomDiv.className = 'prenom-overlay';
    prenomDiv.id = 'prenomOverlay';
    prenomDiv.innerHTML = `
      <div class="prenom-box">
        <div class="owl">🦉</div>
        <h2>Comment tu t'appelles ?</h2>
        <p>Entre ton prénom pour enregistrer tes super points !</p>
        <input class="prenom-input" type="text" id="prenomInput" placeholder="Ton prénom ici..." autocomplete="off">
        <div class="modal-error" id="prenomError"></div>
        <button class="prenom-btn" onclick="savePrenom()">C'est parti ! 🚀</button>
      </div>
    `;
    document.body.appendChild(prenomDiv);
    document.getElementById('prenomInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') savePrenom();
    });
  }
  document.getElementById('prenomInput').focus();
});

function savePrenom() {
  const input = document.getElementById('prenomInput').value.trim();
  const error = document.getElementById('prenomError');
  if (!input) { error.textContent = 'Entre ton prénom !'; return; }
  
  prenomActuel = input;
  document.getElementById('prenomOverlay').classList.add('hidden');
  document.getElementById('eleveBadge').style.display = 'flex';
  document.getElementById('eleveNom').textContent = prenomActuel;
  
  const savedScore = localStorage.getItem('score_' + prenomActuel.toLowerCase());
  score = savedScore ? parseInt(savedScore) : 0;
  document.getElementById('scoreVal').textContent = score;
  
  const container = document.getElementById('chatContainer');
  const savedMsg = score > 0 ? ` Tu as déjà <strong>${score} points</strong> ! 🌟` : '';
  const div = document.createElement('div');
  div.className = 'message prof';
  div.innerHTML = `<div class="avatar prof">🦉</div><div class="bubble">Bonjour <strong>${prenomActuel}</strong> ! Ravi de te revoir !${savedMsg} Prêt(e) à travailler ? 😊</div>`;
  container.appendChild(div);
  
  const savedKey = localStorage.getItem('groq_key');
  if (savedKey) {
    GROQ_KEY = savedKey;
    loadWelcomeQuiz(); 
  } else {
    document.getElementById('modalOverlay').classList.remove('hidden');
    document.getElementById('apiKeyInput').focus();
  }
}

function saveApiKey() {
  const input = document.getElementById('apiKeyInput').value.trim();
  const error = document.getElementById('modalError');
  if (!input) { error.textContent = 'Entre ta clé API !'; return; }
  GROQ_KEY = input;
  localStorage.setItem('groq_key', input);
  document.getElementById('modalOverlay').classList.add('hidden');
  loadWelcomeQuiz();
}

async function loadWelcomeQuiz() {
  const frame = document.getElementById('welcomeQuizFrame');
  if (!frame) return;
  
  frame.style.display = 'block';
  const matieres = ['maths', 'français', 'sciences', 'histoire', 'géographie'];
  const matiereAlea = matieres[Math.floor(Math.random() * matieres.length)];
  
  frame.innerHTML = `<div class="wq-loading">⏳ Préparation de ton défi d'accueil surprise de ${matiereAlea}... 🤔</div>`;
  
  const quizData = await generateQuiz(`Une question surprise de ${matiereAlea}`);
  
  if (!quizData || !quizData.questions || quizData.questions.length === 0) {
    frame.style.display = 'none';
    return;
  }
  
  const q = quizData.questions[0]; 
  
  frame.innerHTML = `
    <div class="wq-title-bar">
      <span class="wq-label">☀️ Défi du matin !</span>
      <span class="wq-subject">${matiereAlea}</span>
    </div>
    <div class="wq-question">${q.q}</div>
    <div class="wq-options">
      ${q.options.map((opt, i) => `<button class="wq-option" onclick="answerWelcomeQuiz(this, ${i}, ${q.correct})">${opt}</button>`).join('')}
    </div>
    <div id="wqResult" class="wq-result" style="display:none;"></div>
  `;
}

function answerWelcomeQuiz(btnClicked, selectedIndex, correctIndex) {
  const container = btnClicked.closest('.wq-options');
  const buttons = container.querySelectorAll('.wq-option');
  const resultDiv = document.getElementById('wqResult');
  
  buttons.forEach((btn, i) => {
    btn.disabled = true; 
    if (i === correctIndex) btn.classList.add('correct');
    else if (i === selectedIndex) btn.classList.add('wrong');
  });
  
  if (selectedIndex === correctIndex) {
    resultDiv.innerHTML = "🏆 Superbe ! C'est la bonne réponse ! 🎉 (+20 pts)";
    resultDiv.style.color = "var(--green)";
    addScore(20);
    speak("Bravo ! C'est la bonne réponse !");
  } else {
    resultDiv.innerHTML = "Mince ! Regarde la réponse en vert 🦉 Entraîne-toi bien aujourd'hui !";
    resultDiv.style.color = "var(--secondary)";
    speak("Dommage ! Regarde la bonne réponse.");
  }
  resultDiv.style.display = "block";
  
  setTimeout(() => {
    document.getElementById('welcomeQuizFrame').style.transform = 'scale(0.9)';
    document.getElementById('welcomeQuizFrame').style.opacity = '0';
    setTimeout(() => { document.getElementById('welcomeQuizFrame').style.display = 'none'; }, 300);
  }, 4000);
}

function changerEleve() {
  if (confirm('Changer d\'élève ? Ton score est bien enregistré !')) {
    prenomActuel = '';
    score = 0;
    document.getElementById('scoreVal').textContent = 0;
    document.getElementById('eleveBadge').style.display = 'none';
    document.getElementById('welcomeQuizFrame').style.display = 'none';
    document.getElementById('welcomeQuizFrame').style.opacity = '1';
    document.getElementById('welcomeQuizFrame').style.transform = 'scale(1)';
    
    document.getElementById('prenomInput').value = '';
    document.getElementById('prenomOverlay').classList.remove('hidden');
    const container = document.getElementById('chatContainer');
    while (container.children.length > 1) container.removeChild(container.lastChild);
  }
}

function sauvegarderScore() {
  if (prenomActuel) {
    localStorage.setItem('score_' + prenomActuel.toLowerCase(), score);
    // PROTECTION SÉCURISÉE TRY...CATCH POUR ÉVITER LES SOUCIS DE PAGE BLANCHE SI L'URL FEUILLE BLOC (404)
    try {
      fetch(GOOGLE_SHEET_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prenom: prenomActuel, score: score })
      }).catch(err => console.log("Sauvegarde en ligne indisponible"));
    } catch(e) {
      console.log("Erreur d'accès à la feuille de calcul.");
    }
  }
}

let currentQuizData = null;
let currentQuizIndex = 0;
let currentQuizScore = 0;
let quizContainer = null;

async function generateQuiz(topic) {
  const isWelcome = topic.includes('question surprise');
  const isBigQuiz = topic.toLowerCase().includes('château') || topic.toLowerCase().includes('histoire') || topic.toLowerCase().includes('multiplication') || topic.toLowerCase().includes('table');
  const count = isWelcome ? 1 : (isBigQuiz ? 10 : 3);
  const maxTokens = isBigQuiz ? 2000 : 500;

  const quizPrompt = `Crée un quiz de EXACTEMENT ${count} questions à choix multiples sur ce sujet pour un enfant de 8 ans (CE2) : "${topic}".
Réponds UNIQUEMENT en JSON valide, sans markdown, sans backticks, exactement comme ceci :
{"questions":[{"q":"La question 1 ?","options":["Réponse A","Réponse B","Réponse C"],"correct":0}${count > 1 ? ', ...' : ''}]}
- correct est l'index de la bonne réponse
- questions adaptées à un enfant de 8 ans
- une seule bonne réponse
- génère précisément ${count} blocs de questions.`;

  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_KEY}` },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{ role: 'user', content: quizPrompt }],
        max_tokens: maxTokens, 
        temperature: 0.5
      })
    });
    const data = await response.json();
    const raw = data.choices[0].message.content.trim();
    const clean = raw.replace(/```json|```/g, '').trim();
    return JSON.parse(clean);
  } catch(e) {
    console.error('Quiz error:', e);
    return null;
  }
}

async function startQuiz(topic, btnEl) {
  const isBigQuiz = topic.toLowerCase().includes('château') || topic.toLowerCase().includes('histoire') || topic.toLowerCase().includes('multiplication') || topic.toLowerCase().includes('table');
  btnEl.textContent = isBigQuiz ? '⏳ Génération du grand quiz...' : '⏳ Génération du quiz...';
  btnEl.disabled = true;
  
  const quizData = await generateQuiz(topic);
  if (!quizData || !quizData.questions) {
    btnEl.textContent = '😕 Erreur, réessaie !';
    btnEl.disabled = false;
    return;
  }
  currentQuizData = quizData.questions;
  currentQuizIndex = 0;
  currentQuizScore = 0;

  const container = document.getElementById('chatContainer');
  const div = document.createElement('div');
  div.className = 'message prof';
  div.innerHTML = `<div class="avatar prof">🦉</div><div class="bubble"><div class="quiz-container" id="quizBox"></div></div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  quizContainer = document.getElementById('quizBox');
  btnEl.parentElement.style.display = 'none';
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const q = currentQuizData[currentQuizIndex];
  const total = currentQuizData.length;
  quizContainer.innerHTML = `
    <div class="quiz-progress">Question ${currentQuizIndex + 1} / ${total} 🎯</div>
    <div class="quiz-question">${q.q}</div>
    <div class="quiz-options">
      ${q.options.map((opt, i) => `<button class="quiz-option" onclick="answerQuiz(${i})">${opt}</button>`).join('')}
    </div>`;
}

function answerQuiz(selectedIndex) {
  const q = currentQuizData[currentQuizIndex];
  const buttons = quizContainer.querySelectorAll('.quiz-option');
  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct) btn.classList.add('correct');
    else if (i === selectedIndex) btn.classList.add('wrong');
  });
  if (selectedIndex === q.correct) currentQuizScore++;

  setTimeout(() => {
    currentQuizIndex++;
    if (currentQuizIndex < currentQuizData.length) {
      renderQuizQuestion();
    } else {
      showQuizResult();
    }
  }, 1000);
}

function showQuizResult() {
  const total = currentQuizData.length;
  const pct = Math.round((currentQuizScore / total) * 100);
  let emoji = pct === 100 ? '🏆⭐🏆' : (pct >= 50 ? '👍😊榜' : '💪😊💪');
  let msg = pct === 100 ? 'Parfait ! Tu as tout bon !' : 'Continue d\'apprendre ! 💪';

  quizContainer.innerHTML = `
    <div class="quiz-result">
      <div class="stars">${emoji}</div>
      <div>${msg}</div>
      <div style="font-size:15px;margin-top:8px;font-weight:700;">Score : ${currentQuizScore} / ${total}</div>
    </div>`;
  addScore(currentQuizScore * 20);
  document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;
}

function openLink(question, url) {
  sendQuick(question);
  setTimeout(() => {
    const container = document.getElementById('chatContainer');
    const div = document.createElement('div');
    div.className = 'message prof';
    div.innerHTML = `<div class="avatar prof">🦉</div><div class="bubble">🎮 Pour s'entraîner en s'amusant :<br><br><a href="${url}" target="_blank" style="display:inline-block; background:var(--primary); color:white; padding:10px 18px; border-radius:14px; text-decoration:none; font-weight:800; font-size:14px; box-shadow:0 4px 12px rgba(108,99,255,0.4);">🕹️ Jouer maintenant !</a></div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }, 2000);
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById('soundBtn').textContent = soundEnabled ? '🔊' : '🔇';
  if (!soundEnabled) window.speechSynthesis.cancel();
}

function speak(text) {
  if (!soundEnabled || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const clean = text.replace(/[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}\u{FE00}-\u{FEFF}]/gu, '');
  const utterance = new SpeechSynthesisUtterance(clean);
  utterance.lang = 'fr-FR';
  utterance.rate = 0.9;
  window.speechSynthesis.speak(utterance);
}

const SYSTEM_PROMPT = `Tu es Hibou 🦉, un professeur virtuel pour élèves de CE2 (8 ans). Phrases courtes, simples, chaleureux, tutoiement. Termine impérativement tes réponses explicatives de tchat par [QUIZ_DISPONIBLE]`;

function selectSubject(btn, subject) {
  document.querySelectorAll('.subject-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentSubject = subject;
  conversationHistory = [];
  updateQuickQuestions(subject);
}

function updateQuickQuestions(subject) {
  const container = document.getElementById('quickQuestions');
  if (subject === 'sciences') {
    container.innerHTML = `
      <button class="quick-btn" onclick="sendQuick('Comment poussent les plantes ?')">💡 Comment poussent les plantes ?</button>
      <button class="quick-btn" onclick="openLink('Explique-moi ce qu\\'est le squelette humain', 'https://www.jeuxpedago.com/jeux-svt-ce2-6eme-le-squelette-niv-2-_pageid905.html')">🦴 Le squelette</button>
    `;
  } else {
    container.innerHTML = `<button class="quick-btn" onclick="sendQuick('Pose-moi une question')">❓ Aide-moi Maître Hibou !</button>`;
  }
}

function addMessage(role, text) {
  const container = document.getElementById('chatContainer');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  let hasQuiz = role === 'prof' && text.includes('[QUIZ_DISPONIBLE]');
  let cleanText = text.replace('[QUIZ_DISPONIBLE]', '').trim();

  div.innerHTML = `<div class="avatar ${role}">${role === 'prof' ? '🦉' : '👦'}</div><div class="bubble">${cleanText.replace(/\n/g, '<br>')}</div>`;
  
  if (hasQuiz) {
    const btn = document.createElement('button');
    btn.className = 'quiz-trigger-btn';
    btn.textContent = '🎯 Faire le quiz !';
    btn.onclick = function() { startQuiz('ce sujet', btn); };
    div.querySelector('.bubble').appendChild(btn);
  }

  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('chatContainer');
  const div = document.createElement('div'); div.className = 'message prof'; div.id = 'typingIndicator';
  div.innerHTML = `<div class="avatar prof">🦉</div><div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
  container.appendChild(div); container.scrollTop = container.scrollHeight;
}

function removeTyping() { const el = document.getElementById('typingIndicator'); if (el) el.remove(); }

function addScore(points) {
  score += points;
  document.getElementById('scoreVal').textContent = score;
  sauvegarderScore();
}

async function askGemini(userMessage) {
  conversationHistory.push({ role: 'user', content: userMessage });
  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_KEY}` },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...conversationHistory],
        max_tokens: 400, temperature: 0.7
      })
    });
    const data = await response.json();
    if (data.error) {
      if (response.status === 401) {
        localStorage.removeItem('groq_key'); GROQ_KEY = '';
        document.getElementById('modalOverlay').classList.remove('hidden');
        return null;
      }
    }
    const reply = data.choices[0].message.content;
    conversationHistory.push({ role: 'assistant', content: reply });
    return reply;
  } catch (err) {
    return "Oups ! Re-vérifie ta clé ou ta connexion ! 🔌";
  }
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  if (!GROQ_KEY) { document.getElementById('modalOverlay').classList.remove('hidden'); return; }

  input.value = '';
  addMessage('user', text);
  showTyping();
  const reply = await askGemini(text);
  removeTyping();
  if (reply) { addMessage('prof', reply); speak(reply.replace('[QUIZ_DISPONIBLE]', '')); }
}

function sendQuick(text) { document.getElementById('userInput').value = text; sendMessage(); }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }

function toggleVoice() {
  if (!('webkitSpeechRecognition' in window)) return;
  if (isRecording) { recognition.stop(); return; }
  const SpeechRecognition = window.webkitSpeechRecognition;
  recognition = new SpeechRecognition(); recognition.lang = 'fr-FR'; recognition.interimResults = false;
  recognition.onstart = () => { isRecording = true; document.getElementById('voiceBtn').classList.add('recording'); };
  recognition.onresult = (e) => { document.getElementById('userInput').value = e.results[0][0].transcript; sendMessage(); };
  recognition.onend = () => { isRecording = false; document.getElementById('voiceBtn').classList.remove('recording'); };
  recognition.start();
}
</script>
